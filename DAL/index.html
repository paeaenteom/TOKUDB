:root{
  --bg:#07060f; --bg2:#0a0816; --panel:#0e0c1a; --panel2:#131020;
  --line:#1e1a31; --line2:#2c2650;
  --ink:#f0edff; --dim:#968fb8; --faint:#5c5580; --mute:#403a60;
  --vio:#c98aff; --vio-d:#a05fe0; --pink:#ff8ad4; --pink-d:#e06bb5;
  --cyan:#87CEFF; --acc:var(--vio);
  --disp:'Teko',sans-serif; --mono:'Share Tech Mono',monospace;
  --jp:'Noto Sans JP',sans-serif; --kr:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--kr);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
::selection{background:rgba(201,138,255,.3)}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg.grad{background:
  radial-gradient(900px 520px at 14% -6%,rgba(201,138,255,.11),transparent 60%),
  radial-gradient(820px 520px at 88% 2%,rgba(255,138,212,.08),transparent 58%),
  linear-gradient(180deg,#06050e,#0a0816 55%,#06050e)}
.bg.grid{background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 90% 70% at 50% 12%,#000 35%,transparent 100%)}
.bg.scan{background:repeating-linear-gradient(0deg,rgba(255,255,255,.014) 0 1px,transparent 1px 4px);opacity:.5}

.nav{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,rgba(7,6,15,.96),rgba(7,6,15,.84));backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-in{max-width:1240px;margin:0 auto;padding:0 22px;height:60px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;white-space:nowrap}
.brand .mk{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:1.5px;line-height:1;background:linear-gradient(110deg,#fff,var(--vio) 55%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .jp{font-family:var(--jp);font-weight:700;font-size:13px;color:var(--faint);letter-spacing:2px}
.home-btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 15px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;transition:.18s;text-decoration:none}
.home-btn:hover{color:var(--ink);border-color:var(--vio-d);background:rgba(201,138,255,.07)}
.crumb{flex:1;font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.hero{max-width:1240px;margin:0 auto;padding:52px 22px 10px;position:relative;z-index:1}
.hero h1{font-family:var(--disp);font-weight:700;font-size:64px;letter-spacing:2px;line-height:.95}
.hero h1 span{background:linear-gradient(110deg,var(--vio),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{margin-top:10px;color:var(--dim);font-size:14px}
.hero .cnt{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:4px;letter-spacing:1px}

.wrap{max-width:1240px;margin:0 auto;padding:18px 22px 80px;position:relative;z-index:1}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:14px 0 22px}
.chips{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.chip{height:32px;padding:0 14px;border:1px solid var(--line2);border-radius:20px;background:var(--panel);color:var(--dim);font-size:12.5px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.chip:hover{color:var(--ink);border-color:var(--vio-d)}
.chip.on{color:#07060f;background:var(--vio);border-color:var(--vio);font-weight:700}
.chip .n{font-family:var(--mono);font-size:10.5px;opacity:.7}
#q{height:36px;width:220px;padding:0 14px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-family:var(--kr);font-size:13px;outline:none}
#q:focus{border-color:var(--vio-d)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--panel),var(--panel2));overflow:hidden;cursor:pointer;transition:.16s;position:relative}
.card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--cl,#c98aff) 55%,transparent);box-shadow:0 10px 26px rgba(0,0,0,.45)}
.card .ph{aspect-ratio:3/4;background:#0a0913;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card .ph img{width:100%;height:100%;object-fit:cover}
.card .ph .ico{width:56px;height:56px;opacity:.28}
.card .cd{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.8px;padding:3px 8px;border-radius:5px;background:rgba(7,6,15,.78);border:1px solid color-mix(in srgb,var(--cl,#c98aff) 45%,transparent);color:var(--cl,#c98aff);text-transform:uppercase}
.card .meta{padding:11px 13px 13px;border-top:1px solid var(--line)}
.card .nm{font-weight:700;font-size:14.5px;line-height:1.25}
.card .jp{font-family:var(--jp);font-size:11px;color:var(--faint);margin-top:3px}
.card .sub{font-size:11px;color:var(--dim);margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.card .sub b{color:var(--cl,#c98aff);font-weight:500}
.empty{padding:60px 0;text-align:center;color:var(--faint);font-size:14px}

.mbk{position:fixed;inset:0;z-index:100;background:rgba(4,3,10,.78);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;padding:44px 18px;overflow-y:auto}
.mbk.on{display:flex}
.modal{width:min(760px,100%);border:1px solid var(--line2);border-radius:16px;background:linear-gradient(180deg,#120f22,#0c0a18);overflow:hidden;position:relative;
  scrollbar-width:none;-ms-overflow-style:none}
.modal::-webkit-scrollbar{width:0;height:0;display:none}
.m-head{padding:24px 26px 18px;border-bottom:1px solid var(--line);position:relative;
  background:radial-gradient(560px 200px at 88% -30%,color-mix(in srgb,var(--cl,#c98aff) 20%,transparent),transparent 65%)}
.m-cd{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:1px solid color-mix(in srgb,var(--cl,#c98aff) 45%,transparent);color:var(--cl,#c98aff);margin-bottom:10px;text-transform:uppercase}
.m-nm{font-weight:900;font-size:28px;line-height:1.1}
.m-jp{font-family:var(--jp);font-size:13.5px;color:var(--dim);margin-top:5px}
.m-x{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--dim);font-size:15px;cursor:pointer}
.m-x:hover{color:var(--ink);border-color:var(--vio-d)}
.m-body{padding:20px 26px 26px;display:flex;flex-direction:column;gap:18px}
.m-top{display:flex;gap:20px;flex-wrap:wrap}
.m-img{width:210px;flex:0 0 auto;aspect-ratio:3/4;border:1px solid var(--line2);border-radius:12px;background:#0a0913;display:flex;align-items:center;justify-content:center;overflow:hidden}
.m-img img{width:100%;height:100%;object-fit:cover}
.m-img .ico{width:64px;height:64px;opacity:.25}
.prof{flex:1;min-width:230px;display:grid;grid-template-columns:auto 1fr;gap:7px 14px;align-content:start;font-size:13px}
.prof dt{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;color:var(--faint);padding-top:2px;white-space:nowrap}
.prof dd{color:var(--ink)}
.prof dd.dim{color:var(--dim)}
.sec{border:1px solid var(--line);border-radius:12px;padding:15px 17px;background:rgba(255,255,255,.012)}
.sec .sh{font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;color:var(--cl,#c98aff);margin-bottom:9px}
.sec .row{display:flex;gap:10px;padding:6px 0;border-top:1px dashed var(--line);font-size:13.5px;flex-wrap:wrap}
.sec .row:first-of-type{border-top:0}
.sec .row .k{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:1px;width:74px;flex:0 0 auto;padding-top:3px}
.sec .row .v{flex:1;line-height:1.55}
.sec .row .v b{color:var(--ink);font-weight:700}
.sec .row .v .jx{font-family:var(--jp);color:var(--dim);font-size:12px;margin-left:6px}

footer{border-top:1px solid var(--line);padding:26px 22px 60px;text-align:center;color:var(--mute);font-family:var(--mono);font-size:11px;letter-spacing:1px;position:relative;z-index:1}
@media (max-width:560px){.hero h1{font-size:46px}.m-top{flex-direction:column}.m-img{width:100%}}

</head>

/* ─── /DATA ─── */

var CATS=['정령','라타토스크','AST','DEM','학교·기타'];
var CAT_CL={'정령':'#ff8ad4','라타토스크':'#c98aff','AST':'#87CEFF','DEM':'#ff9a8a','학교·기타':'#9ff0c0'};
var CAT_IC={'정령':'M12 2l2.4 6.2L21 9l-5 4.4 1.6 6.6L12 16.6 6.4 20l1.6-6.6L3 9l6.6-.8z',
 '라타토스크':'M12 3a9 9 0 1 0 9 9h-9z','AST':'M12 2l9 5v6c0 5-4 8-9 9-5-1-9-4-9-9V7z',
 'DEM':'M12 2l3 7h7l-6 5 3 8-7-5-7 5 3-8-6-5h7z','학교·기타':'M3 10l9-6 9 6-9 6zM7 13v5l5 3 5-3v-5'};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function C(){return (DATA.chars||[]).filter(function(c){return c&&c.name;});}
function cl(c){return CAT_CL[c.cat]||'#c98aff';}
function ico(cat){return '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="'+(CAT_CL[cat]||'#c98aff')+'" stroke-width="1.3"><path d="'+(CAT_IC[cat]||CAT_IC['정령'])+'"/></svg>';}
var curCat='전체', curQ='';

function renderChips(){
  var counts={'전체':C().length};
  CATS.forEach(function(k){counts[k]=C().filter(function(c){return c.cat===k;}).length;});
  var html=['전체'].concat(CATS).map(function(k){
    if(k!=='전체'&&!counts[k])return '';
    return '<button class="chip'+(curCat===k?' on':'')+'" onclick="setCat(\''+k+'\')">'+k+' <span class="n">'+counts[k]+'</span></button>';
  }).join('');
  document.getElementById('chips').innerHTML=html;
  document.getElementById('cnt').textContent='// '+C().length+' CHARACTERS LOGGED';
}
function setCat(c){curCat=c;renderChips();renderGrid();}

function match(c,q){
  if(!q)return true;
  var hay=[c.name,c.jp,c.romaji,c.codename,c.angel,c.dress,c.cv,c.affil].join('¦').toLowerCase();
  return hay.indexOf(q.toLowerCase())!==-1;
}
function renderGrid(){
  var list=C().filter(function(c){return (curCat==='전체'||c.cat===curCat)&&match(c,curQ);});
  var g=document.getElementById('grid');
  g.innerHTML=list.map(function(c){
    var i=C().indexOf(c);
    var ph=c.img?'<img src="'+esc(c.img)+'" alt="'+esc(c.name)+'" loading="lazy" onerror="this.remove()">':ico(c.cat);
    var cd=c.codename?'<span class="cd">'+esc(c.codename.replace(/\s*\(.*\)$/,''))+'</span>':'';
    var subs=[];
    if(c.angel)subs.push('<b>천사</b> '+esc(c.angel.replace(/\s*\(.*\)$/,'')));
    else if(c.species)subs.push(esc(c.species));
    return '<div class="card" style="--cl:'+cl(c)+'" onclick="openC('+i+')">'+
      '<div class="ph">'+cd+ph+'</div>'+
      '<div class="meta"><div class="nm">'+esc(c.name)+'</div><div class="jp">'+esc(c.jp||c.romaji||'')+'</div>'+
      (subs.length?'<div class="sub">'+subs.join(' · ')+'</div>':'')+'</div></div>';
  }).join('');
  document.getElementById('empty').style.display=list.length?'none':'block';
}

var HASH_LOCK=false;
function setHash(c){HASH_LOCK=true;try{history.replaceState(null,'','#'+encodeURIComponent(c.name));}catch(e){}setTimeout(function(){HASH_LOCK=false;},0);}
function clearHash(){HASH_LOCK=true;try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}setTimeout(function(){HASH_LOCK=false;},0);}

function openC(i){
  var c=C()[i];if(!c)return;
  var ph=c.img?'<img src="'+esc(c.img)+'" alt="">':ico(c.cat);
  var prof=[];
  function pf(k,v,dim){if(v)prof.push('<dt>'+k+'</dt><dd'+(dim?' class="dim"':'')+'>'+esc(v)+'</dd>');}
  pf('CATEGORY',c.cat);pf('SPECIES',c.species);pf('GENDER',c.gender);
  pf('BIRTHDAY',c.birthday);pf('HEIGHT',c.height);pf('CV',c.cv);pf('AFFIL',c.affil,true);
  var spirit='';
  if(c.codename||c.angel||c.dress||c.weapon){
    var rows='';
    if(c.codename)rows+='<div class="row"><span class="k">CODENAME</span><span class="v"><b>'+esc(c.codename)+'</b></span></div>';
    if(c.angel)rows+='<div class="row"><span class="k">ANGEL</span><span class="v"><b>'+esc(c.angel.replace(/\s*\(.*\)$/,''))+'</b>'+(/\(/.test(c.angel)?'<span class="jx">'+esc((c.angel.match(/\(([^)]*)\)/)||['',''])[1])+'</span>':'')+'</span></div>';
    if(c.dress)rows+='<div class="row"><span class="k">DRESS</span><span class="v"><b>'+esc(c.dress.replace(/\s*\(.*\)$/,''))+'</b>'+(/\(/.test(c.dress)?'<span class="jx">'+esc((c.dress.match(/\(([^)]*)\)/)||['',''])[1])+'</span>':'')+'</span></div>';
    if(c.weapon)rows+='<div class="row"><span class="k">WEAPON</span><span class="v">'+esc(c.weapon)+'</span></div>';
    spirit='<div class="sec" style="--cl:'+cl(c)+'"><div class="sh">// SPIRIT DATA</div>'+rows+'</div>';
  }
  document.getElementById('modal').innerHTML=
    '<div class="m-head" style="--cl:'+cl(c)+'">'+
    (c.codename?'<span class="m-cd">'+esc(c.codename)+'</span>':'<span class="m-cd">'+esc(c.cat)+'</span>')+
    '<div class="m-nm">'+esc(c.name)+'</div>'+
    '<div class="m-jp">'+esc(c.jp||'')+(c.romaji?' · '+esc(c.romaji):'')+'</div>'+
    '<button class="m-x" onclick="closeModal()">✕</button></div>'+
    '<div class="m-body"><div class="m-top">'+
    '<div class="m-img">'+ph+'</div>'+
    '<dl class="prof">'+prof.join('')+'</dl></div>'+
    spirit+
    (c.desc?'<div class="m-desc">'+esc(c.desc)+'</div>':'')+
    '</div>';
  document.getElementById('mbk').classList.add('on');
  document.body.style.overflow='hidden';
  setHash(c);
  document.getElementById('crumb').textContent='CHARACTER // '+c.name;
}
function closeModal(){
  document.getElementById('mbk').classList.remove('on');
  document.body.style.overflow='';
  clearHash();
  document.getElementById('crumb').textContent='CHARACTER ARCHIVE';
}
function applyHash(){
  if(HASH_LOCK)return;
  var h=decodeURIComponent((location.hash||'').slice(1));
  if(!h){closeModalSilent();return;}
  var i=C().findIndex(function(c){return c.name===h||c.jp===h;});
  if(i>=0)openC(i);
}
function closeModalSilent(){
  document.getElementById('mbk').classList.remove('on');
  document.body.style.overflow='';
}
document.getElementById('mbk').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.getElementById('q').addEventListener('input',function(){curQ=this.value.trim();renderGrid();});
window.addEventListener('hashchange',applyHash);

renderChips();renderGrid();applyHash();
</script>
