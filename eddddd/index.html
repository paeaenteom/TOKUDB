<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特撮DEX EDITOR v3 — WYSIWYG 편집기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root{
  --bg:#06080f; --bg2:#080b14; --panel:#0c1018; --panel2:#10141f;
  --line:#1a2231; --line2:#27324a;
  --ink:#eef2ff; --dim:#8b95b3; --faint:#525d7a; --mute:#39435c;
  --cyan:#87CEFF; --cyan-d:#5ba8e6; --pink:#FFB3C8; --pink-d:#e887a3;
  /* 시리즈 컬러 */
  --sentai:#23d98a; --rider:#b265ff; --metalhero:#3aa6ff; --projectred:#ff3358;
  --ishinomori:#ff8a44; --toeietc:#cda06f; --ultra:#ffc233; --gridman:#36dcff; --tsuetc:#ff4d9d;
  --acc:var(--cyan); --acc2:var(--pink);
  --disp:'Teko',sans-serif; --mono:'Share Tech Mono',monospace;
  --jp:'Noto Sans JP',sans-serif; --kr:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--kr);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
::selection{background:rgba(135,206,255,.3)}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* 배경 */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg.grad{background:
  radial-gradient(900px 520px at 14% -6%,rgba(135,206,255,.12),transparent 60%),
  radial-gradient(820px 520px at 88% 2%,rgba(255,179,200,.09),transparent 58%),
  linear-gradient(180deg,#05070e,#080b15 55%,#05070e)}
.bg.grid{background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 90% 70% at 50% 12%,#000 35%,transparent 100%)}
.bg.scan{background:repeating-linear-gradient(0deg,rgba(255,255,255,.014) 0 1px,transparent 1px 4px);opacity:.5}
#stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.05}50%{opacity:.5}}

/* ===== 네비게이션 (홈 버튼 상시) ===== */
.nav{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,rgba(6,8,15,.96),rgba(6,8,15,.84));backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-in{max-width:1240px;margin:0 auto;padding:0 22px;height:60px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;white-space:nowrap}
.brand .mk{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:1.5px;line-height:1;background:linear-gradient(110deg,#fff,var(--cyan) 55%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .jp{font-family:var(--jp);font-weight:700;font-size:13px;color:var(--faint);letter-spacing:2px}
.home-btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 15px 0 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;transition:.18s;text-decoration:none}
.home-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.home-btn:hover{color:var(--ink);border-color:var(--cyan-d);background:rgba(135,206,255,.07);box-shadow:0 0 0 1px rgba(135,206,255,.18)}
.crumb{flex:1;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.crumb a{color:var(--dim);cursor:pointer;transition:.15s}
.crumb a:hover{color:var(--cyan)}
.crumb .sep{color:var(--mute)}
.crumb .cur{color:var(--ink)}
.nav-rec{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--cyan);white-space:nowrap}
.nav-rec .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@media(max-width:680px){.nav-rec{display:none}.brand .jp{display:none}}

.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:0 22px}

/* ===== 뷰 전환 ===== */
.view{display:none;animation:vin .45s cubic-bezier(.16,1,.3,1)}
.view.active{display:block}
@keyframes vin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ===== 홈 헤더 ===== */
.hd{text-align:center;padding:54px 0 8px}
.hd .eye{font-family:var(--mono);font-size:12px;letter-spacing:.5em;color:var(--faint);text-transform:uppercase}
.hd h1{font-family:var(--disp);font-weight:700;font-size:clamp(46px,8vw,86px);line-height:1;margin-top:14px;background:linear-gradient(115deg,#fff,#d4dafc 42%,#8b93b5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hd h1 .jp{display:block;font-family:var(--jp);font-weight:700;font-size:.2em;line-height:1;letter-spacing:.34em;-webkit-text-fill-color:var(--dim);color:var(--dim);margin-bottom:1.1em}
.hd .lead{margin-top:14px;color:var(--dim);font-size:14px;line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto}
.hd .stats{margin-top:20px;display:inline-flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden;background:var(--panel)}
.hd .stats div{padding:8px 20px;font-size:12.5px;color:var(--dim);border-right:1px solid var(--line)}
.hd .stats div:last-child{border-right:none}
.hd .stats b{font-family:var(--mono);font-size:15px;color:var(--ink);margin-right:5px}

/* ===== 업데이트 스포트라이트 ===== */
.wrap-spot{margin:34px 0 4px}
.wrap-spot:empty{display:none}
.spot{--c:var(--acc);position:relative;border:1px solid var(--line2);border-radius:16px;overflow:hidden;
  background:linear-gradient(150deg,color-mix(in srgb,var(--c) 11%,var(--panel)),var(--bg) 125%);padding:22px 26px 24px}
.spot-h{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11.5px;letter-spacing:.28em;color:var(--dim);margin-bottom:18px}
.spot-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.spot-h .tag{color:var(--faint);letter-spacing:.3em}
.spot-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--c);border:1px solid color-mix(in srgb,var(--c) 45%,transparent);border-radius:7px;padding:5px 11px;background:color-mix(in srgb,var(--c) 10%,transparent)}
.spot-name{font-family:var(--jp);font-weight:700;font-size:32px;color:var(--ink);margin:12px 0 4px;line-height:1.1}
.spot-sub{font-family:var(--jp);font-size:13px;color:var(--faint);letter-spacing:.06em}
.spot-desc{margin-top:12px;color:var(--dim);font-size:14px;line-height:1.6;max-width:640px}
.spot-meta{position:absolute;top:24px;right:26px;text-align:right;font-family:var(--jp);font-size:12px;color:var(--faint);line-height:1.7}
.spot-foot{display:flex;align-items:center;gap:14px;margin-top:18px}
.spot-foot .ent{font-family:var(--mono);font-size:11.5px;letter-spacing:.18em;color:var(--dim)}
.spot-foot .ent b{color:var(--c);font-size:14px;margin-left:6px}
.spot-foot .bar{flex:1;max-width:240px;height:4px;border-radius:3px;background:var(--line);overflow:hidden;margin-left:auto}
.spot-foot .bar i{display:block;height:100%;width:60%;background:linear-gradient(90deg,var(--cyan),var(--pink))}
.spot{cursor:pointer;transition:.18s}
.spot:hover{border-color:color-mix(in srgb,var(--c) 50%,transparent)}

/* ===== 그룹/시리즈 (홈) ===== */
.group{padding:30px 0 8px}
.group-h{display:flex;align-items:baseline;gap:13px;padding:0 4px 14px;border-bottom:1px solid var(--line);margin-bottom:20px}
.group-h .jp{font-family:var(--jp);font-weight:700;font-size:26px;color:var(--ink)}
.group-h .en{font-family:var(--disp);font-weight:500;font-size:21px;letter-spacing:.14em;color:var(--faint)}
.group-h .ko{font-size:13px;color:var(--dim)}
.group-h .n{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
.group-h .n b{color:var(--dim)}

.series-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:880px){.series-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.series-grid{grid-template-columns:1fr}}

/* HSR풍 시리즈 카드 + 시그니처 브래킷 프레임 */
.scard{--c:var(--acc);position:relative;cursor:pointer;border:1px solid var(--line);border-radius:14px;background:
  linear-gradient(165deg,color-mix(in srgb,var(--c) 9%,var(--panel)),var(--bg) 130%);
  padding:24px 22px 20px;min-height:188px;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .34s cubic-bezier(.16,1,.3,1),border-color .3s,box-shadow .3s;
  opacity:0;transform:translateY(20px)}
.series-grid.in .scard{opacity:1;transform:none}
.scard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--c),transparent)}
.scard::after{content:"";position:absolute;inset:0;background:radial-gradient(420px 220px at 110% 120%,color-mix(in srgb,var(--c) 18%,transparent),transparent 60%);pointer-events:none}
.scard:hover{transform:translateY(-5px);border-color:color-mix(in srgb,var(--c) 45%,var(--line));box-shadow:0 24px 52px -24px color-mix(in srgb,var(--c) 60%,#000)}
.scard .crn{position:absolute;width:13px;height:13px;border:1.5px solid color-mix(in srgb,var(--c) 55%,var(--line2));opacity:0;transition:.3s}
.scard:hover .crn{opacity:1}
.scard .crn.tl{top:10px;left:10px;border-right:0;border-bottom:0}
.scard .crn.tr{top:10px;right:10px;border-left:0;border-bottom:0}
.scard .crn.bl{bottom:10px;left:10px;border-right:0;border-top:0}
.scard .crn.br{bottom:10px;right:10px;border-left:0;border-top:0}
.scard .sbg{position:absolute;inset:0;z-index:0;pointer-events:none}
.scard .sbg img{width:100%;height:100%;object-fit:cover;opacity:.30;mask-image:linear-gradient(180deg,transparent 0%,#000 55%)}
.scard>*:not(.sbg){position:relative;z-index:1}
.scard .en{font-family:var(--disp);font-weight:700;font-size:30px;line-height:.95;letter-spacing:.02em;color:var(--ink)}
.scard .jp{font-family:var(--jp);font-weight:500;font-size:13px;color:color-mix(in srgb,var(--c) 70%,var(--dim));margin-top:5px}
.scard .ko{font-weight:700;font-size:16px;margin-top:10px}
.scard .desc{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:9px;flex:1}
.scard .pill{margin-top:14px;display:inline-flex;align-self:flex-start;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--dim);border:1px solid var(--line2);border-radius:7px;padding:5px 10px;background:rgba(0,0,0,.2)}
.scard .pill b{color:var(--c)}
.scard .go{position:absolute;right:18px;bottom:18px;font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.1em;color:var(--c);opacity:0;transform:translateX(-6px);transition:.28s}
.scard:hover .go{opacity:1;transform:none}

/* ===== 시리즈 뷰 (작품 로스터) ===== */
.view-head{padding:34px 0 6px;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.view-head .vh-tag{font-family:var(--mono);font-size:11px;letter-spacing:.4em;color:var(--faint);text-transform:uppercase}
.view-head .vh-en{font-family:var(--disp);font-weight:700;font-size:clamp(38px,6vw,62px);line-height:.9;letter-spacing:.02em;background:linear-gradient(115deg,#fff,color-mix(in srgb,var(--acc) 70%,#fff));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.view-head .vh-jp{font-family:var(--jp);font-weight:500;font-size:14px;color:var(--dim);margin-top:4px}
.view-head .vh-ko{font-weight:700;font-size:17px;margin-top:2px}
.view-head .vh-desc{flex:1;min-width:240px;color:var(--dim);font-size:13px;line-height:1.65;max-width:440px}

/* 시대 필터 칩 (cyberpunk roster style) */
.era-bar{display:flex;gap:8px;flex-wrap:wrap;margin:26px 0 22px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.era-chip{font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:8px 15px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);cursor:pointer;transition:.16s}
.era-chip:hover{color:var(--ink);border-color:var(--acc)}
.era-chip.on{color:var(--bg);background:var(--acc);border-color:var(--acc);font-weight:700}
.era-chip .c{margin-left:6px;opacity:.65}

/* 작품/캐릭터 로스터 그리드 */
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:15px}
@media(max-width:560px){.roster{grid-template-columns:repeat(2,1fr);gap:11px}}
.rcard{--c:var(--acc);position:relative;cursor:pointer;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--panel);transition:transform .3s cubic-bezier(.16,1,.3,1),border-color .25s,box-shadow .25s}
.rcard:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--c) 50%,var(--line));box-shadow:0 18px 40px -22px color-mix(in srgb,var(--c) 65%,#000)}
.rcard .thumb{position:relative;aspect-ratio:3/4;overflow:hidden;background:linear-gradient(155deg,color-mix(in srgb,var(--c) 22%,var(--panel2)),var(--bg) 120%);display:grid;place-items:center}
.rcard .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.rcard:hover .thumb img{transform:scale(1.05)}
/* 슈트(전신) 사진 전용 썸네일: 잘리지 않고 전신이 다 보이도록 세로 비율+contain */
.rcard .thumb.hero-thumb{aspect-ratio:var(--hero-ar,2/5)}
.rcard .thumb.hero-thumb img{object-fit:var(--hero-fit,contain)}
/* 전역 이미지 설정 변수 (DATA._imgcfg → JS가 주입) */
.rcard .thumb{aspect-ratio:var(--card-ar,3/4)}
.rcard .thumb img{object-fit:var(--card-fit,cover)}
.m-hero img{max-height:var(--modal-mh,520px)!important;object-fit:var(--modal-fit,contain)!important}
/* 항목별 오버라이드: 인라인 스타일 변수로 개별 적용 */
.rcard .thumb[data-ifit] img{object-fit:var(--i-fit)!important}
.rcard .thumb[data-iar]{aspect-ratio:var(--i-ar)!important}
.m-hero[data-mfit] img{object-fit:var(--m-fit)!important}
.m-hero[data-mmh] img{max-height:var(--m-mh)!important}
.rcard .thumb .ph{font-family:var(--disp);font-weight:700;font-size:48px;color:color-mix(in srgb,var(--c) 60%,var(--faint))}
.rcard .thumb::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 1px,transparent 1px 3px);opacity:.5;pointer-events:none}
.rcard .crail{position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--c),transparent 85%);z-index:2}
.rcard .no{position:absolute;top:8px;right:8px;z-index:3;font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:#cdd6ee;background:rgba(6,8,15,.7);border:1px solid var(--line2);border-radius:5px;padding:3px 7px;backdrop-filter:blur(4px)}
.rcard .dot{position:absolute;top:8px;left:11px;z-index:3;width:10px;height:10px;border-radius:50%;border:2px solid rgba(6,8,15,.8);box-shadow:0 0 7px currentColor}
.rcard .ep{position:absolute;bottom:8px;left:8px;z-index:3;font-family:var(--mono);font-size:10px;color:#cdd6ee;background:rgba(6,8,15,.72);border-radius:5px;padding:2px 7px;backdrop-filter:blur(4px)}
.rcard .tag{position:absolute;top:8px;left:11px;z-index:4;font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;font-weight:700;border-radius:4px;padding:2px 6px;text-transform:uppercase}
.rcard .tag.ex{background:#3a2c00;color:#ffce4d;border:1px solid #6b5200}
.rcard .tag.dispute{background:#3a1a1a;color:#ff8a8a;border:1px solid #6b2f2f}
.rcard .tag.new2026{background:#0a3a2a;color:#4dffb0;border:1px solid #1a6b4d}
.rcard .tag.anime{background:#2a1a3a;color:#c98aff;border:1px solid #4f2f6b}
.rcard .meta{padding:11px 12px 13px}
.rcard .nm{font-weight:700;font-size:14px;line-height:1.25}
.rcard .jp{font-family:var(--jp);font-size:11px;color:var(--dim);margin-top:3px;line-height:1.3}
.rcard .sub{font-size:11px;color:var(--faint);margin-top:6px;line-height:1.4}
.rcard.clk::before{content:"";position:absolute;inset:0;border:1px solid transparent;border-radius:13px;transition:.25s;pointer-events:none;z-index:5}
.rcard.clk:hover::before{border-color:color-mix(in srgb,var(--c) 40%,transparent);box-shadow:inset 0 0 24px -10px color-mix(in srgb,var(--c) 60%,transparent)}

/* 작품 카드 — 가로형 */
.roster.works{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
@media(max-width:560px){.roster.works{grid-template-columns:1fr}}
.rcard.wcard{aspect-ratio:16/10;display:block}
.rcard.wcard .thumb{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:auto}
.rcard.wcard .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,15,0) 38%,rgba(6,8,15,.55) 68%,rgba(6,8,15,.94) 100%);pointer-events:none}
.rcard.wcard .meta{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:16px 18px 14px}
.rcard.wcard .nm{font-size:16px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.rcard.wcard .jp{color:#c7cee6}
.rcard.wcard .sub{color:#a7b0cc}

/* ===== 작품 뷰 ===== */
.w-banner{position:relative;margin-top:30px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(150deg,color-mix(in srgb,var(--acc) 14%,var(--panel)),var(--bg) 130%);min-height:200px;display:flex;align-items:flex-end}
.w-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 280px at 90% 120%,color-mix(in srgb,var(--acc) 16%,transparent),transparent 60%)}
.w-banner .bimg{position:absolute;inset:0;z-index:0}
.w-banner .bimg img{width:100%;height:100%;object-fit:cover;opacity:.42;mask-image:linear-gradient(90deg,transparent,#000 50%)}
.w-banner .cap{position:relative;z-index:2;padding:28px 30px}
.w-banner .cap .no{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--acc)}
.w-banner .cap .ko{font-family:var(--kr);font-weight:900;font-size:clamp(26px,4.4vw,40px);line-height:1.05;margin-top:6px}
.w-banner .cap .jp{font-family:var(--jp);font-weight:500;font-size:14px;color:var(--dim);margin-top:5px}
.w-banner .btag{position:absolute;top:16px;right:18px;z-index:3;font-family:var(--mono);font-size:10px;letter-spacing:.5px;font-weight:700;border-radius:5px;padding:4px 9px;text-transform:uppercase}
.w-banner .btag.ex{background:#3a2c00;color:#ffce4d}
.w-banner .btag.dispute{background:#3a1a1a;color:#ff8a8a}
.w-banner .btag.new2026{background:#0a3a2a;color:#4dffb0}
.w-banner .btag.anime{background:#2a1a3a;color:#c98aff}

/* 카테고리 탭 */
.w-tabs{display:flex;gap:4px;flex-wrap:wrap;margin:22px 0 0;border-bottom:1px solid var(--line)}
.w-tab{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.16s;position:relative;top:1px}
.w-tab:hover{color:var(--ink)}
.w-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.w-tab .ic{font-size:14px}
.w-tab .cnt{font-family:var(--mono);font-size:10px;color:var(--bg);background:var(--faint);border-radius:99px;padding:1px 6px;min-width:18px;text-align:center}
.w-tab.on .cnt{background:var(--acc)}

.pane{display:none;padding-top:22px}
.pane.on{display:block;animation:vin .35s}

.empty{text-align:center;padding:54px 20px;color:var(--dim)}
.empty .ic{font-size:40px;opacity:.4}
.empty .t{font-weight:700;font-size:15px;margin-top:12px;color:var(--ink)}
.empty .d{font-size:13px;color:var(--faint);margin-top:7px;line-height:1.6}

/* 정보 그리드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:13px;overflow:hidden;max-width:720px}
@media(max-width:560px){.info-grid{grid-template-columns:1fr}}
.info-grid .cell{background:var(--panel);padding:14px 16px}
.info-grid .cell.full{grid-column:1/-1}
.info-grid .k{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;margin-bottom:5px}
.info-grid .v{font-size:14px;line-height:1.55}
.info-grid .v.sum{color:var(--dim);font-size:13.5px;line-height:1.75}

/* ===== 모달 (도시에 카드) ===== */
.modal-bd{position:fixed;inset:0;z-index:100;background:rgba(4,5,11,.78);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:24px}
.modal-bd.open{display:flex;animation:vin .25s}
.modal{--c:var(--acc);position:relative;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:0 30px 80px -30px #000}
.modal::-webkit-scrollbar{width:8px}.modal::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.modal .x{position:absolute;top:13px;right:13px;z-index:6;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:rgba(6,8,15,.6);color:#fff;font-size:19px;display:grid;place-items:center;transition:.18s}
.modal .x:hover{background:var(--pink-d)}
.m-hero{position:relative;overflow:hidden;background:linear-gradient(150deg,color-mix(in srgb,var(--c) 30%,var(--panel2)),var(--bg) 125%);display:grid;place-items:center;min-height:230px;border-radius:16px 16px 0 0}
.m-hero img{width:100%;display:block;max-height:520px;object-fit:contain}
.m-hero .ph{font-family:var(--disp);font-weight:700;font-size:84px;color:color-mix(in srgb,var(--c) 55%,var(--faint))}
.m-hero .crail{position:absolute;left:0;top:0;bottom:0;width:6px;z-index:3}
.m-hero.entity{min-height:210px}
.m-hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:54px;background:linear-gradient(180deg,transparent,var(--panel));pointer-events:none}
.cloak-btn{position:absolute;top:12px;left:14px;z-index:5;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(6,8,15,.55);border:1px solid color-mix(in srgb,var(--c) 50%,#fff);cursor:pointer;backdrop-filter:blur(5px);transition:.18s;opacity:.82}
.cloak-btn:hover{opacity:1}
.cloak-btn img{width:17px;height:17px}
.hImg-base,.hImg-alt{grid-area:1/1}

.m-body{padding:20px 24px 26px}
.m-kicker{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--c);text-transform:uppercase}
.m-nm{font-family:var(--kr);font-weight:900;font-size:25px;line-height:1.1;margin-top:5px}
.m-jp{font-family:var(--jp);font-weight:500;font-size:14px;color:var(--dim);margin-top:3px}
.m-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}
.m-chip{font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:var(--dim);border:1px solid var(--line2);border-radius:6px;padding:4px 9px;background:var(--panel2)}
.m-chip.acc{color:var(--c);border-color:color-mix(in srgb,var(--c) 45%,var(--line2))}
.m-desc{margin-top:15px;font-size:13.5px;line-height:1.75;color:#cdd5ee}
.m-sec{margin-top:20px}
.m-sec-h{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.m-sec-h::after{content:"";flex:1;height:1px;background:var(--line)}
.m-sec-h .cnt{font-family:var(--mono);color:var(--c);font-size:11px}
/* meta rows */
.m-row{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
.m-row .k{font-size:12.5px;color:var(--dim)}
.m-row .v{font-size:13px;text-align:right;max-width:62%}
.m-row .v.dim{color:var(--faint);font-style:italic}
/* skills (스탯바 느낌) */
.m-skills{list-style:none;display:flex;flex-direction:column;gap:11px}
.m-skills li{border:1px solid var(--line);border-left:3px solid var(--c);border-radius:0 9px 9px 0;background:var(--panel2);padding:11px 13px}
.m-skills li.empty{border-left-color:var(--faint);color:var(--faint);font-size:13px;text-align:center;border-radius:9px}
.sk-nm{font-weight:700;font-size:13.5px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.sk-nm span{font-family:var(--jp);font-weight:400;font-size:11.5px;color:var(--dim)}
.sk-d{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:5px}
/* media */
.media{position:relative;width:100%;aspect-ratio:16/9;border-radius:9px;overflow:hidden;background:var(--bg2);border:1px solid var(--line);display:grid;place-items:center;margin-top:8px}
.media img,.media video,.media iframe{width:100%;height:100%;object-fit:cover;border:0}
.media .mph{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.5px}
.m-specs{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.m-spec{font-size:12.5px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 11px;line-height:1.5}

/* footer */
.foot{text-align:center;padding:50px 0 40px;color:var(--faint);font-family:var(--mono);font-size:11px;letter-spacing:.5px}
.foot b{color:var(--dim)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.scard{opacity:1;transform:none}}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ================================================================
   ✎ DEX EDITOR LAYER — 편집 모드 전용 스타일
   (편집 모드 OFF일 때는 사이트 원본과 100% 동일하게 보임)
   ================================================================ */
:root{
  --ed:#FFB300; --ed-d:#c98d00; --ed-bg:rgba(255,179,0,.10);
  --ok:#4dffb0; --danger:#ff5468;
}

/* 헤더 편집 토글 + 내보내기 버튼 */
.ed-nav{display:flex;align-items:center;gap:8px;white-space:nowrap}
.ed-toggle{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;transition:.18s}
.ed-toggle:hover{color:var(--ink);border-color:var(--ed)}
body.editing .ed-toggle{color:#1a1200;background:var(--ed);border-color:var(--ed);font-weight:700}
.ed-btn{display:none;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:11px;cursor:pointer;transition:.15s}
body.editing .ed-btn{display:inline-flex}
.ed-btn:hover{color:var(--ink);border-color:var(--cyan-d)}
.ed-btn.primary{color:#06121a;background:linear-gradient(120deg,var(--cyan),var(--pink));border-color:transparent;font-weight:700}
.ed-btn.primary:hover{filter:brightness(1.08)}
.ed-pending{display:none;font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap}
body.editing .ed-pending{display:inline}
@media(max-width:900px){.ed-pending{display:none!important}.ed-btn span.lbl{display:none}}

/* 편집 모드 배너 스트라이프 */
body.editing .nav{border-bottom-color:var(--ed)}
body.editing .nav::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:repeating-linear-gradient(90deg,var(--ed) 0 14px,transparent 14px 26px);opacity:.65;animation:edmarch 1.2s linear infinite}
@keyframes edmarch{to{background-position:26px 0}}

/* ── 편집 가능 요소 하이라이트 ── */
body.editing .ed-hit{position:relative;cursor:pointer}
body.editing .ed-hit::after{content:"";position:absolute;inset:0;border:1.5px dashed transparent;border-radius:inherit;pointer-events:none;transition:.15s;z-index:8}
body.editing .ed-hit:hover::after{border-color:var(--ed);background:var(--ed-bg)}
body.editing .ed-hit:hover{outline:none}
body.editing .ed-hit .ed-tag{position:absolute;top:-9px;left:8px;z-index:9;font-family:var(--mono);font-size:9px;letter-spacing:.5px;color:#1a1200;background:var(--ed);border-radius:4px;padding:1px 6px;opacity:0;transform:translateY(3px);transition:.15s;pointer-events:none}
body.editing .ed-hit:hover .ed-tag{opacity:1;transform:none}
body.editing .ed-hit.ed-sel::after{border-color:var(--ed);border-style:solid;background:var(--ed-bg)}
body.editing .ed-hit.ed-sel .ed-tag{opacity:1;transform:none}

/* 카드 우상단 삭제 버튼 */
.ed-del{display:none;position:absolute;top:6px;right:6px;z-index:10;width:24px;height:24px;border-radius:6px;border:1px solid #3a1a22;background:rgba(6,8,15,.85);color:var(--danger);font-size:13px;line-height:1;cursor:pointer;transition:.15s;align-items:center;justify-content:center}
body.editing .ed-del{display:flex}
.ed-del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
/* 작품카드는 no 배지와 겹치므로 왼쪽 하단으로 */
.rcard.wcard .ed-del{top:auto;bottom:6px;right:6px}

/* ＋ 추가 카드 */
.ed-add{display:none;border:1.5px dashed var(--line2);border-radius:13px;min-height:120px;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--faint);cursor:pointer;transition:.18s;background:none;font-family:var(--kr)}
body.editing .ed-add{display:flex}
.ed-add:hover{border-color:var(--ed);color:var(--ed);background:var(--ed-bg)}
.ed-add .pl{font-size:30px;line-height:1}
.ed-add .tx{font-size:12px}
.ed-add.works{min-height:180px}
.ed-add.scard-add{min-height:188px;border-radius:14px}

/* ── 우측 편집 패널 ── */
#edPanel{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:94vw;z-index:120;background:var(--panel);border-left:1px solid var(--line2);box-shadow:-24px 0 60px -30px #000;transform:translateX(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
#edPanel.open{transform:none}
.edp-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.edp-head .k{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--ed)}
.edp-head .t{font-weight:700;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edp-head .x{width:30px;height:30px;border-radius:50%;border:none;background:var(--panel2);color:var(--dim);font-size:16px;cursor:pointer}
.edp-head .x:hover{color:var(--ink);background:var(--line2)}
.edp-body{flex:1;overflow-y:auto;padding:16px 18px 40px}
.edp-body::-webkit-scrollbar{width:8px}
.edp-body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
.edp-sec{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;color:var(--faint);text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.edp-sec::after{content:"";flex:1;height:1px;background:var(--line)}
.edp-sec:first-child{margin-top:0}
.efld{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.efld label{font-size:10.5px;color:var(--faint);letter-spacing:.3px}
.efld input[type=text],.efld textarea,.efld select{background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:8px 10px;font-size:12.5px;color:var(--ink);resize:vertical;line-height:1.5;font-family:var(--kr)}
.efld input:focus,.efld textarea:focus,.efld select:focus{outline:none;border-color:var(--ed);box-shadow:0 0 0 2px rgba(255,179,0,.15)}
.efld2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ecolor{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ecolor label{font-size:10.5px;color:var(--faint)}
.ecolor input[type=color]{width:32px;height:28px;border:1px solid var(--line2);border-radius:6px;background:none;cursor:pointer;padding:2px}
.ecolor input[type=text]{width:100px;background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:11.5px;color:var(--ink)}
.echk{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin-bottom:10px;cursor:pointer}
.echk input{accent-color:var(--ed)}
.ehint{font-size:10.5px;color:var(--mute);line-height:1.6;margin:-4px 0 10px}

/* 이미지 슬롯 (패널 내) */
.eslot{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.eslot .box{position:relative;height:170px;border:1.5px dashed var(--line2);border-radius:9px;background:
  linear-gradient(45deg,#0e1220 25%,transparent 25%) 0 0/14px 14px,
  linear-gradient(-45deg,#0e1220 25%,transparent 25%) 0 0/14px 14px,
  linear-gradient(45deg,transparent 75%,#0e1220 75%) 0 0/14px 14px,
  linear-gradient(-45deg,transparent 75%,#0e1220 75%) 0 0/14px 14px,var(--panel2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:.15s}
.eslot .box:hover{border-color:var(--ed)}
.eslot .box.drag{border-color:var(--ed);background-color:var(--ed-bg)}
.eslot .box img{width:100%;height:100%;object-fit:contain}
.eslot .ph{text-align:center;font-size:22px;color:var(--line2)}
.eslot .ph::after{content:'클릭 · 드래그 · Ctrl+V';display:block;font-size:9.5px;color:var(--mute);margin-top:4px;letter-spacing:.3px}
.eslot .ph.has{font-size:11px;color:var(--faint);line-height:1.5}
.eslot .path{background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:10px;color:var(--dim)}
.eslot .path:focus{outline:none;border-color:var(--ed);color:var(--ink)}
.eslot .acts{display:flex;gap:6px}
.eslot .sbtn{height:24px;padding:0 9px;border:1px solid var(--line2);border-radius:6px;background:var(--panel2);color:var(--dim);font-family:var(--mono);font-size:9.5px;cursor:pointer}
.eslot .sbtn:hover{color:var(--ink);border-color:var(--cyan-d)}
.eslot .inf{font-size:9.5px;color:var(--faint);min-height:12px;font-family:var(--mono)}
.eslot .inf.new{color:var(--ok)}
.eslot .inf.loaded{color:var(--cyan)}

/* 스킬 편집 행 */
.eskills{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.eskill{display:grid;grid-template-columns:1fr 1fr 26px;gap:5px 6px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px}
.eskill input{background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:5px 7px;font-size:11.5px;color:var(--ink)}
.eskill textarea{grid-column:1/3;background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:5px 7px;font-size:11.5px;color:var(--ink);resize:vertical}
.eskill .del{grid-row:1/3;align-self:start;background:none;border:1px solid var(--line2);border-radius:5px;color:var(--faint);width:24px;height:24px;cursor:pointer;font-size:12px}
.eskill .del:hover{color:var(--danger);border-color:var(--danger)}
.eadd-sm{display:inline-flex;align-items:center;gap:5px;height:27px;padding:0 11px;border:1px dashed var(--line2);border-radius:7px;background:none;color:var(--dim);font-size:11px;cursor:pointer;margin-bottom:6px}
.eadd-sm:hover{color:var(--ed);border-color:var(--ed)}

.edp-danger{margin-top:22px;display:flex;justify-content:flex-end}
.ebtn-danger{height:30px;padding:0 13px;border:1px solid #3a1a22;border-radius:7px;background:none;color:var(--danger);font-size:11.5px;cursor:pointer;font-family:var(--mono)}
.ebtn-danger:hover{background:rgba(255,84,104,.12);border-color:var(--danger)}

/* 모달 내부 편집 힌트 (팝업 이미지 클릭 유도) */
body.editing .m-hero.ed-hit:hover::after{border-radius:16px 16px 0 0}
body.editing .cloak-btn{z-index:12}

/* 시리즈/작품 배너 편집 태그 위치 보정 */
body.editing .w-banner.ed-hit .ed-tag{top:8px;left:auto;right:8px}
body.editing .scard .ed-del{top:8px;right:8px}

/* 토스트 */
.ed-toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:10px 18px;font-size:12.5px;color:var(--ink);opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 14px 40px -14px #000}
.ed-toast.show{opacity:1;transform:translate(-50%,0)}
.ed-toast.err{border-color:var(--danger);color:#ffb3bd}

/* 경로 점검 패널 */
#edInteg{position:fixed;right:16px;bottom:16px;width:350px;max-height:56vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:15px 17px;z-index:150;box-shadow:0 20px 50px -20px #000;display:none}
#edInteg h3{font-family:var(--disp);font-size:17px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
#edInteg h3 button{background:none;border:none;color:var(--faint);cursor:pointer;font-size:15px}
#edInteg .sum{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-bottom:9px;line-height:1.8}
#edInteg .sum b{color:var(--ink)}
#edInteg .it{font-size:11px;color:var(--faint);padding:6px 0;border-top:1px solid var(--line)}
#edInteg .it b{color:var(--dim);display:block;font-size:10.5px}
#edInteg .it span{font-family:var(--mono);font-size:9.5px;color:var(--mute);word-break:break-all}

/* 파일 로드 게이트 (아직 index.html 안 불러왔을 때) */
#edGate{position:fixed;inset:0;z-index:300;background:rgba(4,5,11,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:22px}
#edGate.hide{display:none}
.gate-card{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:30px 32px;text-align:center}
.gate-card .mk{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:1px;background:linear-gradient(110deg,#fff,var(--cyan) 55%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.gate-card .jp{font-family:var(--jp);font-size:12px;color:var(--faint);letter-spacing:2px;margin-top:2px}
.gate-card p{font-size:12.5px;color:var(--dim);line-height:1.8;margin:16px 0 20px}
.gate-card code{font-family:var(--mono);color:var(--cyan);background:var(--bg);padding:1px 6px;border-radius:4px;font-size:11.5px}
.gate-btns{display:flex;flex-direction:column;gap:9px;align-items:stretch}
.gate-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border:1px solid var(--line2);border-radius:9px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;transition:.15s}
.gate-btn:hover{border-color:var(--cyan-d);background:rgba(135,206,255,.07)}
.gate-btn.primary{background:linear-gradient(120deg,var(--cyan),var(--pink));color:#06121a;font-weight:700;border-color:transparent}
.gate-btn.primary:hover{filter:brightness(1.07)}
.gate-sub{font-size:10.5px;color:var(--mute);margin-top:14px;line-height:1.7}

</style>
</head>
<body>
<div class="bg grad"></div>
<div class="bg grid"></div>
<div class="bg scan"></div>
<div id="stars" class="bg"></div>

<nav class="nav">
  <div class="nav-in">
    <div class="brand" onclick="showHome()">

/* 전역 이미지 표시 설정: DATA._imgcfg = {cardAr,cardFit,heroAr,heroFit,modalMh,modalFit} */
function applyImgCfg(){
  const c=DATA._imgcfg||{};
  const r=document.documentElement.style;
  r.setProperty('--card-ar',c.cardAr||'3/4');
  r.setProperty('--card-fit',c.cardFit||'cover');
  r.setProperty('--hero-ar',c.heroAr||'2/5');
  r.setProperty('--hero-fit',c.heroFit||'contain');
  r.setProperty('--modal-mh',(c.modalMh||520)+'px');
  r.setProperty('--modal-fit',c.modalFit||'contain');
}
/* 항목별 이미지 오버라이드 인라인 속성 생성 (it.imgFit/imgAr → 카드, it.modalFit/modalMh → 팝업) */
function itemThumbAttr(it){
  let a='',s='';
  if(it&&it.imgFit){a+=' data-ifit="1"';s+=`--i-fit:${it.imgFit};`;}
  if(it&&it.imgAr){a+=' data-iar="1"';s+=`--i-ar:${it.imgAr};`;}
  return a+(s?` style="${s}"`:'');
}
function itemModalAttr(it){
  let a='',s='';
  if(it&&it.modalFit){a+=' data-mfit="1"';s+=`--m-fit:${it.modalFit};`;}
  if(it&&it.modalMh){a+=' data-mmh="1"';s+=`--m-mh:${it.modalMh}px;`;}
  return a+(s?` style="${s}"`:'');
}
function seriesColor(s){const c=(s&&s.c)||'acc';return c.startsWith('#')?c:`var(--${c})`;}
function getSeries(key){for(const g of Object.values(DATA))if(g&&g.series&&g.series[key])return g.series[key];return null;}
function getSeriesGroup(key){for(const g of Object.values(DATA))if(g&&g.series&&g.series[key])return g;return null;}
function seriesTotal(s){return s.eras.reduce((a,e)=>a+e.works.filter(w=>!w._todo).length,0);}
function esc(s){return String(s==null?'':s);}
function iu(p){
  const s=String(p==null?'':p);
  if(!s)return s;
  if(/^https?:\/\//i.test(s)||s.startsWith('data:')||s.startsWith('//'))return s;
  const enc=s.split('/').map(seg=>seg?encodeURIComponent(seg):seg).join('/');
  return s.startsWith('/')?enc:dbBase()+enc;
}
/* 이미지 로드 실패 시 깨진 아이콘 대신 자동으로 이니셜 플레이스홀더로 전환 (kaiju 등 파일 미업로드 항목용) */

  const t=e.target;
  if(!t||t.tagName!=='IMG'||t.dataset.phFallback)return;

  ph.className='ph';
  ph.textContent=label?label[0]:'？';
  if(t.classList.contains('hImg-base'))ph.classList.add('hImg-base');
  if(t.classList.contains('hImg-alt')){ph.classList.add('hImg-alt');ph.style.display=t.style.display;}
  t.replaceWith(ph);
},true);

function totalStats(){
  let works=0,series=0,heroes=0,kaiju=0;
  for(const g of Object.values(DATA)){if(!g||!g.series)continue;for(const k in g.series){series++;const s=g.series[k];
    for(const e of s.eras)for(const w of e.works){works++;heroes+=(w.members||[]).length;kaiju+=(w.kaiju||[]).length;}}}
  return {works,series,heroes,kaiju};
}

/* ===== 업데이트 스포트라이트: 데이터(작품) 있을 때만 표시 ===== */
function renderSpotlight(){
  const box=document.getElementById('spotlight');
  if(!box)return;
  // 작품이 들어있는 시리즈만 후보로
  const cands=[];
  for(const g of Object.values(DATA)){if(!g||!g.series)continue;for(const k in g.series){
    const s=g.series[k];
    const works=[];s.eras.forEach(e=>e.works.forEach(w=>{if(!w._todo)works.push(w);}));
    if(works.length)cands.push({k,s,g,works});
  }}
  if(!cands.length){box.innerHTML='';return;}   // 데이터 없으면 아무것도 안 나옴
  // 가장 최근 작품(year 큰 값) 보유 시리즈를 스포트라이트로
  cands.forEach(c=>{c.latest=Math.max(...c.works.map(w=>parseInt(w.year)||0));});
  cands.sort((a,b)=>b.latest-a.latest);
  const {k,s,g,works}=cands[0];
  const lead=works.slice().sort((a,b)=>(parseInt(b.year)||0)-(parseInt(a.year)||0))[0];
  const entries=s.eras.reduce((a,e)=>a+e.works.filter(w=>!w._todo).reduce((x,w)=>x+1+(w.members||[]).length+(w.kaiju||[]).length,0),0);
  box.innerHTML=`
    <div class="spot" style="--c:${seriesColor(s)}" onclick="showSeries('${k}')">
      <div class="spot-h"><span class="tag">// UPDATE</span><span class="ln"></span></div>
      <div class="spot-meta">${esc(g.jp)} ${esc(g.ko)}<br>${esc(s.jp)}</div>
      <div class="spot-badge">★ ${esc(s.en)}</div>
      <div class="spot-name">${esc(lead?lead.ko:s.ko)}</div>
      <div class="spot-sub">${esc(lead?(lead.jp+(lead.year?' · '+lead.year:'')):s.jp)}</div>
      <div class="spot-desc">${esc(lead&&lead.summary?lead.summary:(s.desc||''))}</div>
      <div class="spot-foot">
        <span class="ent">ENTRIES:<b>${entries}</b></span>
        <span class="bar"><i></i></span>
      </div>
    </div>`;
}
let curSeriesKey=null, curEra='all';

  const s=getSeries(key);if(!s)return showHome();
  curSeriesKey=key;curEra='all';
  setAccent(s.c);
  if(!fromRoute)pushURL(dbBase()+key+'/');
  setCrumb([{t:'HOME',fn:'showHome()'},{t:s.en,cur:true}]);
  document.getElementById('series-head').innerHTML=`
    <div>
      <div class="vh-tag">SERIES INDEX</div>
      <div class="vh-en">${esc(s.en)}</div>
      <div class="vh-jp">${esc(s.jp)}</div>
      <div class="vh-ko">${esc(s.ko)}</div>
    </div>
    <div class="vh-desc">${esc(s.desc||'')}</div>`;
  // 시대 칩
  const eras=s.eras.filter(e=>e.works.length);
  const chips=[`<div class="era-chip on" onclick="filterEra('all',this)">전체 <span class="c">${seriesTotal(s)}</span></div>`]
    .concat(eras.map((e,i)=>`<div class="era-chip" onclick="filterEra('${e.id||i}',this)">${esc(e.label)} <span class="c">${e.works.filter(w=>!w._todo).length}</span></div>`));
  document.getElementById('era-bar').innerHTML=chips.join('');
  renderRoster(s,'all');
  document.getElementById('series-foot').innerHTML=`${esc(s.en)} · ${seriesTotal(s)} WORKS · 작품을 선택하면 영웅·괴수·무장·장비·폼이 펼쳐집니다`;
  switchView('view-series');window.scrollTo({top:0});
}
function filterEra(id,el){
  curEra=id;
  document.querySelectorAll('#era-bar .era-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderRoster(getSeries(curSeriesKey),id);
}
function renderRoster(s,eraId){
  const out=[];
  s.eras.forEach((e,eIdx)=>{
    if(eraId!=='all' && (e.id||eIdx)!=String(eraId)) return;
    e.works.forEach((w,wi)=>{
      if(w._todo)return;
      out.push(workCard(s,w,eIdx,wi));
    });
  });
  document.getElementById('series-body').innerHTML=
    `<div class="roster works">${out.join('')}</div>`;
}
function workCard(s,w,eIdx,wi){
  const img=w.img?`<img src="${iu(w.img)}" alt="${esc(w.ko)}" loading="lazy">`
    :`<span class="ph">${(esc(w.no).replace(/[^0-9]/g,'')||esc(w.ko)[0]||'?')}</span>`;
  const tag=w.tag?`<span class="tag ${w.tag}">${tagLabel(w.tag)}</span>`
    :`<span class="dot" style="color:${seriesColor(s)}"></span>`;
  const sub=[w.year,w.motif].filter(Boolean).join(' · ');
  return `<div class="rcard wcard clk" style="--c:${seriesColor(s)}"
    onclick="openWork('${curSeriesKey}',${eIdx},${wi})">
    <div class="thumb"><span class="crail"></span>${tag}<span class="no">${esc(w.no||'—')}</span>${img}</div>
    <div class="meta"><div class="nm">${esc(w.ko)}</div><div class="jp">${esc(w.jp)}</div>${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>

}

function entCard(it,click,num,catId){

/* 폼: 영웅별 기본(슈트) 폼만 집계. imgAlt(변신 전/본명 모습)는 영웅 탭 상세팝업의 은폐 토글로만 노출하고
   여기서는 더 이상 별도 카드로 만들지 않는다. formHidden 멤버(동일 슈트 재사용하는 2대 키레인저 등)는 제외. */
function collectForms(w){
  const forms=[];
  (w.members||[]).forEach((h,hi)=>{
    if(h.person)return;
    if(h.formHidden)return;
    forms.push({hi,name:h.name,jp:h.jp,img:h.img,color:h.color,sub:'기본 폼',kind:'base',_h:h});
  });
  return forms;
}
function paneForms(forms,key,eIdx,wi){
  if(!forms.length)return emptyPane('🔥','폼');
  const cards=forms.map((f,i)=>{
    const thumb=f.img?`<img src="${iu(f.img)}" alt="${esc(f.name)}" loading="lazy">`:`<span class="ph">${esc((f.name||'?')[0])}</span>`;
    const rail=f.color?`<span class="crail" style="background:linear-gradient(180deg,${f.color},transparent 85%)"></span>`:`<span class="crail"></span>`;
    const cvar=f.color?` style="--c:${f.color}"`:'';
    return `<div class="rcard clk"${cvar} onclick="openHero('${key}',${eIdx},${wi},${f.hi})">
      <div class="thumb hero-thumb"${itemThumbAttr(f._h)}>${rail}<span class="no">${esc(f.sub)}</span>${thumb}</div>
      <div class="meta"><div class="nm">${esc(f.name)}</div>${f.jp?`<div class="jp">${esc(f.jp)}</div>`:''}</div>
    </div>`;
  }).join('');
  return `<div class="roster">${cards}</div>`;
}

function ytId(u){const m=String(u).match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);return m?m[1]:u;}
function mediaInner(m){
  if(m.type==='video')return `<video src="${m.src}" controls playsinline></video>`;
  if(m.type==='youtube')return `<iframe src="https://www.youtube.com/embed/${ytId(m.src)}" allowfullscreen></iframe>`;
  return `<img src="${m.src}" alt="" loading="lazy">`;
}
function mediaSlot(m,ph){
  if(!m||!m.src)return `<div class="media"><span class="mph">${ph||'미디어 준비 중'}</span></div>`;
  return `<div class="media">${mediaInner(m)}</div>`;
}

/* ===== 모달 ===== */
function openModal(html,color){
  const m=document.getElementById('modal');
  m.innerHTML=html;
  m.style.setProperty('--c',color||'var(--acc)');
  document.getElementById('modal-bd').classList.add('open');
  document.body.style.overflow='hidden';
  m.scrollTop=0;
}
function closeModal(){document.getElementById('modal-bd').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleHeroImg(btn){
  const hero=btn.closest('.m-hero');
  const base=hero.querySelector('.hImg-base'),alt=hero.querySelector('.hImg-alt');
  if(!alt)return;
  const showAlt=base.style.display!=='none';
  base.style.display=showAlt?'none':'block';
  alt.style.display=showAlt?'block':'none';
  btn.classList.toggle('on',showAlt);
}
function openHero(key,eIdx,wi,hi){
  const w=getSeries(key).eras[eIdx].works[wi];
  const h=(w.members||[])[hi];if(!h)return;
  const rail=h.color?`<span class="crail" style="background:linear-gradient(180deg,${h.color},transparent 85%)"></span>`:`<span class="crail" style="background:var(--acc)"></span>`;
  if(h.person){
    const pimg=h.img?`<img src="${iu(h.img)}" alt="${esc(h.name)}">`:`<span class="ph">${esc((h.name||'?')[0])}</span>`;
    openModal(`<button class="x" onclick="closeModal()">×</button>
      <div class="m-hero entity"${itemModalAttr(h)}>${rail}${pimg}</div>
      <div class="m-body">
        <div class="m-kicker">인물 · 변신자</div>
        <div class="m-nm">${esc(h.name)}</div>
        ${h.jp?`<div class="m-jp">${esc(h.jp)}</div>`:''}
        ${h.sub?`<div class="m-chips"><span class="m-chip">${esc(h.sub)}</span></div>`:''}
        ${h.desc?`<p class="m-desc">${esc(h.desc)}</p>`:''}
        <div class="m-sec"><div class="m-sec-h">🎬 미디어</div>${mediaSlot(h.media,'사진·영상')}</div>
      </div>`,h.color);
    return;
  }
  const hasAlt=!!h.imgAlt;
  const img=h.img
    ?`<img class="hImg-base" src="${iu(h.img)}" alt="${esc(h.name)}">`+(hasAlt?`<img class="hImg-alt" src="${iu(h.imgAlt)}" alt="" style="display:none">`:'')
    :`<span class="ph">${esc((h.name||'?')[0])}</span>`;
  const cloak=hasAlt?`<button class="cloak-btn" onclick="toggleHeroImg(this)" title="${esc(h.imgAltLabel||'다른 모습')}"><img src="${CLOAK_ICON}" alt=""></button>`:'';
  const chips=[h.sub?`<span class="m-chip acc">변신자 · ${esc(h.sub)}</span>`:'',
    h.item&&h.item!=='—'?`<span class="m-chip">🔧 ${esc(h.item)}</span>`:''].filter(Boolean).join('');
  const skills=h.skills||[];
  const skillList=skills.length
    ?skills.map(s=>`<li><div class="sk-nm">${esc(s.name)}${s.jp?`<span>${esc(s.jp)}</span>`:''}</div>${s.desc?`<div class="sk-d">${esc(s.desc)}</div>`:''}${(s.media&&s.media.src)?`<div style="margin-top:8px">${mediaSlot(s.media)}</div>`:''}</li>`).join('')
    :`<li class="empty">스킬·필살기 데이터 준비 중</li>`;
  openModal(`<button class="x" onclick="closeModal()">×</button>
    <div class="m-hero"${itemModalAttr(h)}>${rail}${cloak}${img}</div>
    <div class="m-body">
      <div class="m-kicker">HERO</div>
      <div class="m-nm">${esc(h.name)}</div>
      ${h.jp?`<div class="m-jp">${esc(h.jp)}</div>`:''}
      ${chips?`<div class="m-chips">${chips}</div>`:''}
      ${h.desc?`<p class="m-desc">${esc(h.desc)}</p>`:''}
      <div class="m-sec"><div class="m-sec-h">✨ 변신</div>${mediaSlot(h.henshin,'변신 GIF·영상')}</div>
      <div class="m-sec"><div class="m-sec-h">스펙</div>
        <div class="m-row"><span class="k">🔧 변신 아이템</span><span class="v ${h.item&&h.item!=='—'?'':'dim'}">${(h.item&&h.item!=='—')?esc(h.item):'준비 중'}</span></div>
        <div class="m-row"><span class="k">🤖 전용 메카·탈것</span><span class="v ${h.mecha&&h.mecha!=='—'?'':'dim'}">${(h.mecha&&h.mecha!=='—')?esc(h.mecha):'준비 중'}</span></div>
      </div>
      <div class="m-sec"><div class="m-sec-h">⚡ 스킬 · 필살기 <span class="cnt">${skills.length}</span></div>
        <ul class="m-skills">${skillList}</ul></div>
    </div>`,h.color);
}
function openEntity(key,eIdx,wi,type,idx){
  const w=getSeries(key).eras[eIdx].works[wi];
  const map={arsenal:w.arsenal,machines:w.machines,kaiju:w.kaiju,org:w.orgs};
  const list=map[type]||[];const it=list[idx];if(!it)return;
  const kicker={arsenal:'⚔️ 무장 · 무기',machines:'🤖 장비 · 메카',kaiju:'👾 괴수 · 우주인',org:'🛡️ 조직 · 집단'}[type];
  const vis=(it.media&&it.media.src)?mediaInner(it.media)
    :(it.photo||it.img)?`<img src="${iu(it.photo||it.img)}" alt="${esc(it.name)}">`
    :`<span class="ph">${esc((it.name||'?')[0])}</span>`;
  const rail=it.color?`<span class="crail" style="background:linear-gradient(180deg,${it.color},transparent 85%)"></span>`:`<span class="crail" style="background:var(--acc)"></span>`;
  const chips=[it.cat?`<span class="m-chip">${esc(it.cat)}</span>`:'',it.ep?`<span class="m-chip acc">${esc(it.ep)}</span>`:''].filter(Boolean).join('');
  const specs=[it.spec?`<div class="m-spec">📐 ${esc(it.spec)}</div>`:'',
    it.defeat?`<div class="m-spec">💥 결정타 · ${esc(it.defeat)}</div>`:'',
    it.suit?`<div class="m-spec">🎭 슈트 유용 · ${esc(it.suit)}</div>`:''].filter(Boolean).join('');
  const body=it.desc||it.sub||'';
  openModal(`<button class="x" onclick="closeModal()">×</button>
    <div class="m-hero entity"${itemModalAttr(it)}>${rail}${vis}</div>
    <div class="m-body">
      <div class="m-kicker">${kicker}</div>
      <div class="m-nm">${esc(it.name)}</div>
      ${it.jp?`<div class="m-jp">${esc(it.jp)}</div>`:''}
      ${chips?`<div class="m-chips">${chips}</div>`:''}
      ${specs?`<div class="m-specs">${specs}</div>`:''}
      ${body?`<p class="m-desc">${esc(body)}</p>`:''}
      <div class="m-sec"><div class="m-sec-h">🎬 미디어</div>${mediaSlot(it.media,'GIF · 이미지 · 영상')}</div>
    </div>`,it.color);
}

/* ===== UI 유틸 ===== */
function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setAccent(c){const r=document.documentElement.style;r.setProperty('--acc',String(c).startsWith('#')?c:`var(--${c})`);}
function setCrumb(items){
  document.getElementById('crumb').innerHTML=items.map((it,i)=>{
    const node=it.cur?`<span class="cur">${esc(it.t)}</span>`:`<a onclick="${it.fn}">${esc(it.t)}</a>`;
    return (i?'<span class="sep">/</span>':'')+node;
  }).join(' ');
}
function showHome(fromRoute){
  if(!fromRoute)pushURL(dbBase());
  setAccent('cyan');
  setCrumb([{t:'HOME',cur:true}]);
  switchView('view-home');window.scrollTo({top:0});
}
function tagLabel(t){return {new2026:'2026 신작',ex:'외전',dispute:'논쟁',anime:'애니'}[t]||t;}

/* ===== URL 라우팅 ===== */
function dbBase(){const m=location.pathname.match(/^(.*\/DB)(\/|$)/);return m?m[1]+'/':'/DB/';}
function workSlug(w,eIdx,wi){return w.slug||`w${eIdx}-${wi}`;}
function pushURL(path){try{history.pushState({},'',path);}catch(e){}}
function findWorkBySlug(key,slug){
  const s=getSeries(key);if(!s)return null;
  for(let e=0;e<s.eras.length;e++)for(let i=0;i<s.eras[e].works.length;i++)
    if(workSlug(s.eras[e].works[i],e,i)===slug)return{eIdx:e,wi:i};
  return null;
}
function routeTo(){
  const rest=location.pathname.replace(/^.*\/DB\/?/,'').replace(/\/$/,'');
  const parts=rest.split('/').filter(Boolean);
  const skey=parts[0],wslug=parts[1];
  if(skey&&getSeries(skey)){
    if(wslug){const f=findWorkBySlug(skey,wslug);if(f){showSeries(skey,true);openWork(skey,f.eIdx,f.wi,true);return;}}
    showSeries(skey,true);return;
  }
  showHome(true);
}
window.addEventListener('popstate',routeTo);

applyImgCfg();
renderHome();
routeTo();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ================================================================
   ✎ DEX EDITOR — 코어 (파일 로드 / 이미지 / 내보내기)
   ================================================================ */
'use strict';
const ED = {
  active:false,             // 편집 모드 on/off
  fullText:null, dataStart:0, dataEnd:0, fileName:'index.html',
  pendingImages:new Map(),  // relPath -> {blob,url,w,h,origSize}
  existingFiles:new Map(),  // relPath -> {url}
  maxDim:1200, quality:0.85,
  dirty:false,
};

function edToastMsg(msg, isErr){
  const el=document.getElementById('edToast');
  el.textContent=msg;
  el.className='ed-toast show'+(isErr?' err':'');
  clearTimeout(edToastMsg._t);
  edToastMsg._t=setTimeout(()=>el.classList.remove('show'),3200);
}
function edFmtKB(b){return (b/1024).toFixed(1)+'KB';}
function edSanitize(s){return String(s||'').trim().replace(/[\\/:*?"<>|]/g,'').replace(/\s+/g,'_').slice(0,80)||'untitled';}
function edEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- const DATA = {...} 블록을 중괄호 깊이로 정확히 파싱 ---- */
function edFindDataBlock(fullText){
  const marker='const DATA = ';
  const mi=fullText.indexOf(marker);
  if(mi===-1)return null;
  const os=mi+marker.length;
  if(fullText[os]!=='{')return null;
  let depth=0,i=os,inStr=false,sc='',ef=false;
  for(;i<fullText.length;i++){
    const ch=fullText[i];
    if(inStr){
      if(ef){ef=false;}
      else if(ch==='\\'){ef=true;}
      else if(ch===sc){inStr=false;}
      continue;
    }
    if(ch==='"'||ch==="'"||ch==='`'){inStr=true;sc=ch;continue;}
    if(ch==='{')depth++;
    else if(ch==='}'){depth--;if(depth===0){i++;break;}}
  }
  return {objStart:os,objEnd:i,text:fullText.slice(os,i)};
}

/* ---- index.html 불러오기: DATA 교체 + 전체 재렌더 ---- */
async function edLoadHtmlFile(file){
  const text=await file.text();
  const block=edFindDataBlock(text);
  if(!block){edToastMsg('const DATA = {...} 블록을 못 찾았어. DB/index.html이 맞는지 확인해줘.',true);return false;}
  let parsed;
  try{parsed=JSON.parse(block.text);}
  catch(err){edToastMsg('DATA 파싱 실패: '+err.message,true);return false;}
  ED.fullText=text; ED.dataStart=block.objStart; ED.dataEnd=block.objEnd; ED.fileName=file.name;
  ED.pendingImages.clear(); ED.dirty=false;
  // 사이트 전역 DATA를 통째로 교체 (키를 비우고 다시 채움 — const 재할당 회피)
  for(const k of Object.keys(DATA))delete DATA[k];
  Object.assign(DATA,parsed);
  document.getElementById('edGate').classList.add('hide');
  document.getElementById('edLoadedName').textContent=file.name;
  applyImgCfg(); edApplySiteText();
  renderHome(); routeTo(); edUpdatePending();
  edToastMsg('불러오기 완료: '+file.name);
  return true;
}

/* ---- 이 파일 자체를 그대로 사용 (내장 DATA로 시작) ---- */
function edUseSelf(){
  // 현재 문서의 소스를 fetch로 읽어 원본 텍스트 확보 (file:// 실패 시 DOM 직렬화 폴백)
  fetch(location.href).then(r=>r.text()).then(t=>{
    const block=edFindDataBlock(t);
    if(block){ED.fullText=t;ED.dataStart=block.objStart;ED.dataEnd=block.objEnd;}
    else edSelfFallback();
  }).catch(edSelfFallback).finally(()=>{
    ED.fileName='index.html';
    document.getElementById('edGate').classList.add('hide');
    document.getElementById('edLoadedName').textContent='(이 파일의 내장 데이터)';
    edToastMsg('내장 데이터로 시작. 저장 시 이 파일 구조 그대로 나가.');
  });
}
function edSelfFallback(){
  // fetch 불가(file:// 등) → 문서 직렬화로 대체. DATA 블록 좌표 재계산.
  const t='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const block=edFindDataBlock(t);
  if(block){ED.fullText=t;ED.dataStart=block.objStart;ED.dataEnd=block.objEnd;}
  else{ED.fullText=null;edToastMsg('원본 소스 확보 실패 — 내보내기 전에 index.html을 불러와줘.',true);}
}

/* ---- 기존 img 폴더 인식 (미리보기용) ---- */
function edLoadFolder(files){
  ED.existingFiles.clear();
  let n=0;
  for(const f of files){
    const rp=f.webkitRelativePath||'';
    const idx=rp.indexOf('img/');
    if(idx===-1)continue;
    ED.existingFiles.set(rp.slice(idx),{url:URL.createObjectURL(f)});
    n++;
  }
  edToastMsg(`기존 이미지 ${n}개 인식 (미리보기 반영)`);
  edRerender();
}

/* ---- 이미지 파일 처리: 리사이즈 + WebP (GIF는 원본 유지) ---- */
function edProcessImage(file){
  return new Promise((resolve,reject)=>{
    if(file.type==='image/gif'){
      const img=new Image(),url=URL.createObjectURL(file);
      img.onload=()=>{resolve({blob:file,w:img.naturalWidth,h:img.naturalHeight,ext:'gif'});URL.revokeObjectURL(url);};
      img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('GIF를 읽지 못했어'));};
      img.src=url;return;
    }
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.naturalWidth,h=img.naturalHeight;
      const L=Math.max(w,h);
      if(L>ED.maxDim){const s=ED.maxDim/L;w=Math.max(1,Math.round(w*s));h=Math.max(1,Math.round(h*s));}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cv.toBlob(b=>{
        if(!b){reject(new Error('WebP 인코딩 실패'));return;}
        resolve({blob:b,w,h,ext:'webp'});
      },'image/webp',ED.quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('이미지를 읽지 못했어'));};
    img.src=url;
  });
}

/* ---- 경로 → 미리보기 URL 해석 (사이트 렌더에도 주입) ---- */
function edResolve(path){
  if(!path)return null;
  if(ED.pendingImages.has(path))return {url:ED.pendingImages.get(path).url,kind:'new'};
  if(ED.existingFiles.has(path))return {url:ED.existingFiles.get(path).url,kind:'loaded'};
  return null;
}

function edUpdatePending(){
  const el=document.getElementById('edPending');
  const n=ED.pendingImages.size;
  let t=0;for(const v of ED.pendingImages.values())t+=v.blob.size;
  el.textContent=n?`대기 ${n}장 · ${edFmtKB(t)}`:'대기 이미지 없음';
}

/* ---- 내보내기 ---- */
function edBuildFullText(){
  const json=JSON.stringify(DATA,null,2);
  if(ED.fullText)return ED.fullText.slice(0,ED.dataStart)+json+ED.fullText.slice(ED.dataEnd);
  return null;
}
function edDownload(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();a.remove();
}
function edExportHtml(){
  const t=edBuildFullText();
  if(!t){edToastMsg('원본 텍스트가 없어 — 먼저 index.html을 불러와줘.',true);return;}
  edDownload(new Blob([t],{type:'text/html'}),ED.fileName||'index.html');
  ED.dirty=false;
  edToastMsg('index.html 저장 완료');
}
async function edExportImgs(){
  if(!ED.pendingImages.size){edToastMsg('내보낼 신규 이미지가 없어.',true);return;}
  const zip=new JSZip();
  for(const [p,info] of ED.pendingImages)zip.file('DB/'+p,info.blob);
  edDownload(await zip.generateAsync({type:'blob'}),'dex-images.zip');
  edToastMsg('이미지 ZIP 저장 완료');
}
async function edExportAll(){
  const t=edBuildFullText();
  if(!t){edToastMsg('원본 텍스트가 없어 — 먼저 index.html을 불러와줘.',true);return;}
  const zip=new JSZip();
  zip.file('DB/index.html',t);
  for(const [p,info] of ED.pendingImages)zip.file('DB/'+p,info.blob);
  edDownload(await zip.generateAsync({type:'blob'}),'dex-deploy.zip');
  ED.dirty=false;
  edToastMsg(`배포 ZIP 저장 완료 (index.html + 이미지 ${ED.pendingImages.size}장) — 저장소 루트에 덮어써줘`);
}

/* ---- 경로 점검 ---- */
const ED_CATS=[
  {id:'members',label:'영웅',folder:'hero',isHero:true},
  {id:'kaiju',label:'괴수',folder:'kaiju'},
  {id:'arsenal',label:'무장',folder:'arsenal'},
  {id:'machines',label:'장비',folder:'machines'},
  {id:'orgs',label:'조직',folder:'org'},
];
function edWalk(cb){
  for(const g of Object.values(DATA)){if(!g||!g.series)continue;for(const s of Object.values(g.series))
    for(const era of s.eras)for(const w of era.works){
      const wl=w.ko||'(제목 없음)';
      cb(wl+' › 배너',w);
      for(const c of ED_CATS)for(const it of (w[c.id]||[]))cb(`${wl} › ${c.label} › ${it.name||'(이름 없음)'}`,it);
    }}
}
function edCheckPath(p){
  if(!p)return 'empty';
  if(ED.pendingImages.has(p))return 'new';
  if(ED.existingFiles.has(p))return 'loaded';
  return 'unknown';
}
function edIntegrity(){
  let total=0,ok=0,unknown=0,empty=0;const list=[];
  edWalk((label,obj)=>{
    const checks=[];
    if('img' in obj)checks.push(['img',obj.img]);
    if('photo' in obj)checks.push(['photo',obj.photo]);
    if('imgAlt' in obj)checks.push(['imgAlt',obj.imgAlt]);
    if(obj.media&&obj.media.type==='image')checks.push(['media',obj.media.src]);
    if(obj.henshin&&obj.henshin.type==='image')checks.push(['henshin',obj.henshin.src]);
    for(const [f,p] of checks){
      total++;
      const st=edCheckPath(p);
      if(st==='empty'){empty++;continue;}
      if(st==='new'||st==='loaded'){ok++;continue;}
      unknown++;list.push({label:label+' · '+f,path:p});
    }
  });
  const el=document.getElementById('edInteg');
  el.style.display='block';
  el.innerHTML=`<h3>경로 점검 <button type="button" onclick="this.closest('#edInteg').style.display='none'">✕</button></h3>
    <div class="sum">전체 이미지 필드 <b>${total}</b>개<br>확인됨 <b style="color:var(--ok)">${ok}</b> · 미지정 <b>${empty}</b> · 확인불가 <b style="color:${unknown?'var(--danger)':'var(--faint)'}">${unknown}</b></div>
    ${unknown?`<div style="font-size:10.5px;color:var(--faint);margin-bottom:5px">경로만 있고 이번 세션에 업로드/폴더인식 안 된 항목이야. 저장소에 이미 있으면 문제 없어.</div>`:''}
    ${list.map(u=>`<div class="it"><b>${edEsc(u.label)}</b><span>${edEsc(u.path)}</span></div>`).join('')}`;
}

/* ================================================================
   ✎ DEX EDITOR v3 — 사이트 렌더 후킹 (전체 화면 WYSIWYG)
   이미지가 들어가는/들어갈 수 있는 모든 곳 + 터치 가능한 모든 것 편집
   ================================================================ */

function edRerender(){
  const workView=document.getElementById('view-work').classList.contains('active');

/* pending/기존폴더 blob URL을 화면 <img>에 주입 */
function edInjectPreviews(rootEl){
  const root=rootEl||document;
  root.querySelectorAll('img').forEach(img=>{
    const src=img.getAttribute('src')||'';
    let rel=null;
    try{
      const u=decodeURIComponent(src);
      const i=u.indexOf('img/');
      if(i>-1)rel=u.slice(i);
    }catch(e){}
    if(!rel)return;
    const r=edResolve(rel);
    if(r)img.src=r.url;
  });
}

/* 요소에 편집 표식 부착 헬퍼 */
function edMark(el,label,onClick){
  if(!el)return;
  el.classList.add('ed-hit');
  el.insertAdjacentHTML('beforeend',`<span class="ed-tag">${edEsc(label)}</span>`);
  if(onClick)el.addEventListener('click',ev=>{
    if(!ED.active)return;
    if(ev.target.closest('.ed-del,.ed-add'))return;
    ev.stopPropagation();ev.preventDefault();
    onClick(ev);
  },true);
}

/* ── 시리즈 추가/삭제 ── */
function edAddSeries(gkey){
  const g=DATA[gkey];if(!g)return;
  let key=prompt('새 시리즈의 영문 키(소문자·숫자, URL용)를 입력해줘.\n예: garo, ultraq');
  if(key==null)return;
  key=key.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!key){edToastMsg('키가 비었어. 영문 소문자로 입력해줘.',true);return;}
  if(getSeries(key)){edToastMsg(`'${key}' 키는 이미 있어. 다른 키를 써줘.`,true);return;}
  g.series[key]={
    c:'#87CEFF', en:key.toUpperCase(), ko:'새 시리즈', jp:'',
    desc:'', countMain:0, countEx:0,
    eras:[{id:'showa',label:'昭和 쇼와',works:[]}],
  };
  ED.dirty=true;
  renderHome();
  edOpenSeriesPanel(key);
  edToastMsg(`새 시리즈 '${key}' 추가됨 — 이름·색·시대를 채워줘`);
}
function edDeleteSeries(key){
  const g=(function(){for(const gg of Object.values(DATA))if(gg&&gg.series&&gg.series[key])return gg;return null;})();
  const s=g&&g.series[key];if(!s)return;
  const total=s.eras.reduce((a,e)=>a+e.works.length,0);
  if(!confirm(`'${s.ko||key}' 시리즈를 통째로 삭제할까?\n안에 든 작품 ${total}개도 전부 사라져. 되돌릴 수 없어.`))return;
  delete g.series[key];
  ED.dirty=true;
  edClosePanel();
  renderHome();
  edToastMsg('시리즈 삭제 완료');
}

function edDecorateWorkPanes(key,eIdx,wi,w){
  const tabs=[...document.querySelectorAll('#w-tabs .w-tab')];
  const panes=[...document.querySelectorAll('#w-body .pane')];
  tabs.forEach((tab,ti)=>{
    const label=tab.textContent;
    const pane=panes[ti];
    if(!pane)return;
    let catId=null;
    if(label.includes('영웅'))catId='members';
    else if(label.includes('괴수'))catId='kaiju';
    else if(label.includes('무장'))catId='arsenal';
    else if(label.includes('장비'))catId='machines';
    else if(label.includes('조직'))catId='orgs';
    else if(label.includes('폼'))catId='_forms';
    else if(label.includes('정보'))catId='_info';

    if(catId==='_info'){
      edMark(pane.querySelector('.info-grid')||pane,'작품 정보 편집',()=>edOpenWorkPanel(key,eIdx,wi));
      return;
    }
    if(catId==='_forms'){
      pane.querySelectorAll('.rcard').forEach(card=>{
        card.classList.add('ed-hit');
        card.insertAdjacentHTML('beforeend','<span class="ed-tag">영웅 편집</span>');
      });
      return;
    }
    const list=w[catId]||[];
    const roster=pane.querySelector('.roster');
    pane.querySelectorAll('.rcard').forEach((card,ci)=>{
      card.classList.add('ed-hit');
      const nm={members:'영웅',kaiju:'괴수',arsenal:'무장',machines:'장비',orgs:'조직'}[catId];
      card.insertAdjacentHTML('beforeend',`<span class="ed-tag">${edEsc(nm)} 편집</span><button type="button" class="ed-del" title="삭제">🗑</button>`);
      card.querySelector('.ed-del').addEventListener('click',ev=>{
        ev.stopPropagation();
        edDeleteEntity(key,eIdx,wi,catId,ci);
      });
    });
    {
      const add=document.createElement('button');
      add.type='button';add.className='ed-add';
      const catLabel={members:'영웅',kaiju:'괴수',arsenal:'무장',machines:'장비',orgs:'조직'}[catId];
      add.innerHTML=`<span class="pl">＋</span><span class="tx">새 ${catLabel} 추가</span>`;
      add.addEventListener('click',()=>edAddEntity(key,eIdx,wi,catId));
      if(roster)roster.appendChild(add);
      else{
        const r=document.createElement('div');r.className='roster';r.appendChild(add);
        pane.innerHTML='';pane.appendChild(r);
      }
    }
  });
}

function edFocusSlot(fieldKey){
  let slot;
  if(fieldKey==='media-any'){
    slot=document.querySelector('#edPanel .eslot.emedia .box, #edPanel .eslot.emedia select');
  }else{
    slot=document.querySelector(`#edPanel .eslot[data-field="${fieldKey}"] .box`);
  }
  if(slot){slot.scrollIntoView({behavior:'smooth',block:'center'});
    const box=slot.classList?slot:slot.parentElement;
    box.classList.add('drag');setTimeout(()=>box.classList.remove('drag'),900);}
}

function edBlankHero(){return {name:'새 영웅',jp:'',sub:'',color:'#87CEFF',desc:'',item:'',mecha:'',skills:[],img:'',imgAlt:'',imgAltLabel:'변신 전 (본명)'};}
function edBlankEntity(){return {name:'새 항목',jp:'',sub:'',cat:'',ep:'',color:'',desc:'',img:''};}
function edBlankWork(){return {no:'',ko:'새 작품',jp:'',year:'',format:'',heroes:'',motif:'',item:'',summary:'',tag:'',slug:'',members:[],kaiju:[],arsenal:[],machines:[],orgs:[]};}

function edAddEntity(key,eIdx,wi,catId){
  const w=getSeries(key).eras[eIdx].works[wi];
  const list=w[catId]||(w[catId]=[]);
  list.push(catId==='members'?edBlankHero():edBlankEntity());
  ED.dirty=true;
  openWork(key,eIdx,wi,true);
  if(catId==='members')edOpenHeroPanel(key,eIdx,wi,list.length-1);
  else edOpenEntityPanel(key,eIdx,wi,catId==='orgs'?'org':catId,list.length-1);
  edToastMsg('새 항목 추가됨 — 오른쪽에서 내용을 채워줘');
}
function edDeleteEntity(key,eIdx,wi,catId,idx){
  const w=getSeries(key).eras[eIdx].works[wi];
  const list=w[catId]||[];
  const it=list[idx];if(!it)return;
  if(!confirm(`'${it.name||'(이름 없음)'}' 항목을 삭제할까? 되돌릴 수 없어.`))return;
  list.splice(idx,1);
  ED.dirty=true;
  edClosePanel();
  openWork(key,eIdx,wi,true);
  edToastMsg('삭제 완료');
}
function edAddWork(key,eIdx){
  const s=getSeries(key);
  s.eras[eIdx].works.push(edBlankWork());
  ED.dirty=true;
  const wi=s.eras[eIdx].works.length-1;
  openWork(key,eIdx,wi,true);
  edOpenWorkPanel(key,eIdx,wi);
  edToastMsg('새 작품 추가됨 — 제목과 슬러그부터 채워줘');
}
function edDeleteWork(key,eIdx,wi){
  const s=getSeries(key);
  const w=s.eras[eIdx].works[wi];
  if(!confirm(`'${w.ko||'(제목 없음)'}' 작품을 통째로 삭제할까? 되돌릴 수 없어.`))return;
  s.eras[eIdx].works.splice(wi,1);
  ED.dirty=true;
  edClosePanel();
  showSeries(key,true);
  edToastMsg('작품 삭제 완료');
}

function edBindFields(body,obj,onChange){

function edBindColor(body,obj,onChange){

/* ── 이미지 크기 설정 위젯 ──
   scope: 'item'이면 obj에 imgFit/imgAr/modalFit/modalMh 오버라이드 저장
   "전역 따름" 선택 시 필드 삭제(=전역 설정 사용) */
const ED_FITS=[['','(전역 따름)'],['contain','전신 (contain — 안 잘림)'],['cover','꽉 채움 (cover — 잘릴 수 있음)']];
const ED_ARS=[['','(전역 따름)'],['3/4','3:4 표준'],['2/5','2:5 세로 길게'],['1/1','1:1 정사각'],['4/3','4:3 가로'],['16/9','16:9 와이드']];
function edSizeWidget(obj,onChange){
  const w=document.createElement('div');
  function sel(label,key,opts,cur){
    return `<div class="efld"><label>${label}</label><select data-sz="${key}">
      ${opts.map(([v,t])=>`<option value="${v}" ${cur===v||(!cur&&v==='')?'selected':''}>${t}</option>`).join('')}
    </select></div>`;
  }
  w.innerHTML=`
    <div class="ehint">팝업 전(카드)과 팝업 후(모달)를 따로 설정할 수 있어. "(전역 따름)"이면 ⚙ 화면 설정을 그대로 써.</div>
    <div class="efld2">
      ${sel('카드 표시 방식','imgFit',ED_FITS,obj.imgFit||'')}
      ${sel('카드 비율','imgAr',ED_ARS,obj.imgAr||'')}
    </div>
    <div class="efld2">
      ${sel('팝업 표시 방식','modalFit',ED_FITS,obj.modalFit||'')}
      <div class="efld"><label>팝업 최대 높이(px)</label><input type="text" data-sz="modalMh" value="${obj.modalMh||''}" placeholder="(전역 따름)"></div>
    </div>
    <button type="button" class="eadd-sm" data-syncbtn>🔗 카드=팝업 통일 (카드 설정을 팝업에 복사)</button>`;
  w.querySelectorAll('[data-sz]').forEach(el=>{
    el.addEventListener(el.tagName==='SELECT'?'change':'input',()=>{
      const k=el.dataset.sz;
      const v=el.value.trim();
      if(!v)delete obj[k];
      else if(k==='modalMh'){const n=parseInt(v);if(n>0)obj[k]=n;else delete obj[k];}
      else obj[k]=v;
      ED.dirty=true;
      if(onChange)onChange();
    });
  });
  w.querySelector('[data-syncbtn]').addEventListener('click',()=>{
    if(obj.imgFit)obj.modalFit=obj.imgFit;else delete obj.modalFit;
    delete obj.modalMh;
    ED.dirty=true;
    // UI 갱신
    const mSel=w.querySelector('select[data-sz="modalFit"]');
    mSel.value=obj.modalFit||'';
    w.querySelector('input[data-sz="modalMh"]').value='';
    if(onChange)onChange();
    edToastMsg('카드 표시 방식을 팝업에도 복사했어');
  });
  return w;
}

          :`<div class="ph">＋</div>`)}
      </div>
      <input type="text" class="path" placeholder="img/.../파일명.webp" value="${edEsc(path)}">
      <div class="acts">
        <button type="button" class="sbtn sg">경로 제안</button>
        <button type="button" class="sbtn cl">비우기</button>
      </div>
      <div class="inf"></div>`;
    const box=wrap.querySelector('.box'),pathIn=wrap.querySelector('.path'),inf=wrap.querySelector('.inf');
    if(pv){
      const pi=ED.pendingImages.get(path);
      if(pi){inf.textContent=`신규 · ${pi.w}×${pi.h} · ${edFmtKB(pi.blob.size)}${pi.origSize?` (원본 ${edFmtKB(pi.origSize)})`:''}`;inf.className='inf new';}
      else{inf.textContent='기존 폴더에서 인식됨';inf.className='inf loaded';}
    }else if(path){inf.textContent='경로만 지정됨';}
    pathIn.addEventListener('input',()=>{obj[key]=pathIn.value.trim();ED.dirty=true;render();if(onChange)onChange();});
    box.addEventListener('click',()=>{
      const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
      inp.addEventListener('change',()=>{if(inp.files[0])handle(inp.files[0]);});
      inp.click();
    });
    box.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();box.click();}});
    box.addEventListener('dragover',e=>{e.preventDefault();box.classList.add('drag');});
    box.addEventListener('dragleave',()=>box.classList.remove('drag'));
    box.addEventListener('drop',e=>{e.preventDefault();box.classList.remove('drag');const f=e.dataTransfer.files&&e.dataTransfer.files[0];if(f)handle(f);});
    box.addEventListener('paste',e=>{
      const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
      for(const it of items){if(it.type&&it.type.startsWith('image/')){const f=it.getAsFile();if(f)handle(f);break;}}
    });
    wrap.querySelector('.sg').addEventListener('click',()=>{obj[key]=defaultPathFn();ED.dirty=true;render();if(onChange)onChange();});
    wrap.querySelector('.cl').addEventListener('click',()=>{
      if(obj[key]&&ED.pendingImages.has(obj[key]))ED.pendingImages.delete(obj[key]);
      obj[key]='';ED.dirty=true;render();edUpdatePending();if(onChange)onChange();
    });
    async function handle(file){
      if(!file.type||!file.type.startsWith('image/')){edToastMsg('이미지 파일이 아니야.',true);return;}
      try{
        const r=await edProcessImage(file);
        let tp=pathIn.value.trim()||defaultPathFn();
        tp=tp.replace(/\.[a-zA-Z0-9]+$/,'')+'.'+r.ext;
        if(obj[key]&&obj[key]!==tp&&ED.pendingImages.has(obj[key]))ED.pendingImages.delete(obj[key]);
        ED.pendingImages.set(tp,{blob:r.blob,url:URL.createObjectURL(r.blob),w:r.w,h:r.h,origSize:file.size});
        obj[key]=tp;ED.dirty=true;
        render();edUpdatePending();
        if(onChange)onChange();
        edToastMsg('이미지 처리 완료: '+tp);
      }catch(err){edToastMsg('이미지 처리 실패: '+err.message,true);}
    }
  }
  render();
  return wrap;
}

/* ── 미디어 슬롯 ── */
function edMediaSlot(obj,key,defaultPathFn,onChange){
  const wrap=document.createElement('div');
  wrap.className='eslot emedia';
  function render(){
    const m=obj[key];const type=(m&&m.type)||'none';
    wrap.innerHTML=`
      <select class="mtype" style="background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:7px 9px;font-size:12px;color:var(--ink)">
        <option value="none" ${type==='none'?'selected':''}>없음</option>
        <option value="image" ${type==='image'?'selected':''}>이미지 / GIF</option>
        <option value="youtube" ${type==='youtube'?'selected':''}>유튜브 URL</option>
        <option value="video" ${type==='video'?'selected':''}>영상 파일 URL</option>
      </select>
      <div class="mbody"></div>`;
    const body=wrap.querySelector('.mbody');
    wrap.querySelector('.mtype').addEventListener('change',e=>{
      const t=e.target.value;
      if(t==='none')delete obj[key];
      else obj[key]={type:t,src:(obj[key]&&obj[key].src)||''};
      ED.dirty=true;render();if(onChange)onChange();
    });
    if(type==='image'){
      body.appendChild(edImageSlot(obj[key],'src',defaultPathFn,onChange));
    }else if(type==='youtube'||type==='video'){
      body.innerHTML=`<input type="text" class="path" style="width:100%" placeholder="${type==='youtube'?'https://youtu.be/...':'영상 URL'}" value="${edEsc(obj[key].src||'')}">`;
      body.querySelector('input').addEventListener('input',e=>{obj[key].src=e.target.value;ED.dirty=true;if(onChange)onChange();});
    }
  }
  render();
  return wrap;
}

function edApplySiteText(){
  const st=DATA._site||{};
  if(st.lead)document.querySelector('#view-home .hd .lead').textContent=st.lead;
  if(st.eye)document.querySelector('#view-home .hd .eye').textContent=st.eye;
}
function edOpenSitePanel(){
  DATA._site=DATA._site||{};
  const st=DATA._site;
  const cur={
    eye:st.eye||document.querySelector('#view-home .hd .eye').textContent,
    lead:st.lead||document.querySelector('#view-home .hd .lead').textContent,
  };
  edPanelCtx={kind:'site'};
  const cfg=DATA._imgcfg||(DATA._imgcfg={});
  const fitOpt=(cur)=>['cover','contain'].map(v=>`<option value="${v}" ${cur===v?'selected':''}>${v==='cover'?'꽉 채움 (잘릴 수 있음)':'전신 (안 잘림)'}</option>`).join('');
  const arOpt=(cur)=>['3/4','2/5','1/1','4/3','16/9'].map(v=>`<option value="${v}" ${cur===v?'selected':''}>${v}</option>`).join('');
  const body=edPanelShell('SITE EDIT','사이트 제목·소개 · ⚙ 화면 설정',`
    <div class="edp-sec">홈 상단 텍스트</div>
    ${edFld('상단 소문구 (영문 eyebrow)','__eye',cur.eye)}
    ${edArea('소개 문구','__lead',cur.lead,3)}
    <div class="edp-sec">⚙ 전역 이미지 크기 — 사이트 전체 기본값</div>
    <div class="ehint">개별 항목에서 "(전역 따름)"으로 둔 모든 이미지에 적용돼. 팝업 전(카드)/팝업 후(모달) 따로야.</div>
    <div class="efld2">
      <div class="efld"><label>일반 카드 표시</label><select data-cfg="cardFit"><option value="cover" ${(cfg.cardFit||'cover')==='cover'?'selected':''}>꽉 채움</option><option value="contain" ${cfg.cardFit==='contain'?'selected':''}>전신</option></select></div>
      <div class="efld"><label>일반 카드 비율</label><select data-cfg="cardAr">${arOpt(cfg.cardAr||'3/4')}</select></div>
    </div>
    <div class="efld2">
      <div class="efld"><label>영웅 카드 표시</label><select data-cfg="heroFit"><option value="contain" ${(cfg.heroFit||'contain')==='contain'?'selected':''}>전신</option><option value="cover" ${cfg.heroFit==='cover'?'selected':''}>꽉 채움</option></select></div>
      <div class="efld"><label>영웅 카드 비율</label><select data-cfg="heroAr">${arOpt(cfg.heroAr||'2/5')}</select></div>
    </div>
    <div class="efld2">
      <div class="efld"><label>팝업 이미지 표시</label><select data-cfg="modalFit"><option value="contain" ${(cfg.modalFit||'contain')==='contain'?'selected':''}>전신</option><option value="cover" ${cfg.modalFit==='cover'?'selected':''}>꽉 채움</option></select></div>
      <div class="efld"><label>팝업 최대 높이(px)</label><input type="text" data-cfg="modalMh" value="${cfg.modalMh||520}"></div>
    </div>
    <button type="button" class="eadd-sm" id="epUnify">🔗 카드=팝업 통일 (카드 표시 방식을 팝업에 복사)</button>
    <div class="ehint">이 설정은 DATA에 저장돼서 배포하면 실제 사이트에도 그대로 적용돼.</div>
  `);
  body.querySelector('input[data-k="__eye"]').addEventListener('input',e=>{st.eye=e.target.value;ED.dirty=true;edApplySiteText();});
  body.querySelector('textarea[data-k="__lead"]').addEventListener('input',e=>{st.lead=e.target.value;ED.dirty=true;edApplySiteText();});
  body.querySelectorAll('[data-cfg]').forEach(el=>{
    el.addEventListener(el.tagName==='SELECT'?'change':'input',()=>{
      const k=el.dataset.cfg;
      if(k==='modalMh'){const n=parseInt(el.value);if(n>0)cfg[k]=n;}
      else cfg[k]=el.value;
      ED.dirty=true;
      applyImgCfg();
    });
  });
  body.querySelector('#epUnify').addEventListener('click',()=>{
    cfg.modalFit=cfg.cardFit||'cover';
    body.querySelector('select[data-cfg="modalFit"]').value=cfg.modalFit;
    ED.dirty=true;applyImgCfg();
    edToastMsg('카드 표시 방식을 팝업에도 복사했어');
  });
}

    <span class="ed-pending" id="edPending">대기 이미지 없음</span>
    <label class="ed-btn" title="다른 index.html 불러오기">📂<span class="lbl"> 불러오기</span><input type="file" id="edLoadInput" accept=".html" hidden></label>
    <label class="ed-btn" title="저장소의 DB/img 폴더를 선택하면 기존 이미지가 미리보기에 보여">🗂<span class="lbl"> img 폴더</span><input type="file" id="edFolderInput" webkitdirectory multiple hidden></label>
    <button type="button" class="ed-btn" id="edCheckBtn" title="이미지 경로 전수 점검">🔍<span class="lbl"> 점검</span></button>
    <button type="button" class="ed-btn" id="edExpHtml" title="index.html만 다운로드">HTML</button>

    <button type="button" class="ed-btn primary" id="edExpAll" title="index.html + 신규 이미지 전체 배포 ZIP">📦<span class="lbl"> 배포 ZIP</span></button>
  `;
  const rec=navIn.querySelector('.nav-rec');
  navIn.insertBefore(holder,rec);
  const nameEl=document.createElement('span');
  nameEl.id='edLoadedName';nameEl.style.display='none';
  holder.appendChild(nameEl);
})();

document.body.insertAdjacentHTML('beforeend',`
  <div class="ed-toast" id="edToast"></div>
  <div id="edPanel"></div>
  <div id="edInteg"></div>
  <div id="edGate">
    <div class="gate-card">
      <div class="mk">DEX EDITOR</div>
      <div class="jp">特撮DEX WYSIWYG 편집기 v3</div>
      <p>사이트 화면 그대로 보면서 <b>전부</b> 편집하는 로컬 편집기야.<br>
      배포 중인 <code>DB/index.html</code>을 불러오거나, 이 파일에 내장된 데이터로 바로 시작할 수 있어.</p>
      <div class="gate-btns">
        <label class="gate-btn primary">📂 DB/index.html 불러오기<input type="file" id="edGateLoad" accept=".html" hidden></label>
        <button type="button" class="gate-btn" id="edGateSelf">이 파일의 내장 데이터로 시작</button>
      </div>
      <div class="gate-sub">타이틀·그룹명·시리즈·작품·영웅·괴수·무장·장비·조직·팝업 이미지까지 전부 클릭해서 편집.<br>
      ⚙ 화면 설정에서 카드/팝업 이미지 크기를 통일하거나 항목별로 따로 정할 수 있어.<br>
      끝나면 <b>📦 배포 ZIP</b>으로 받아서 저장소에 덮어쓰고 push.</div>
    </div>
  </div>
`);

function edSetActive(on){
  ED.active=on;
  document.body.classList.toggle('editing',on);
  if(!on){
    edClosePanel();
    document.querySelectorAll('.ed-del,.ed-add,.ed-tag').forEach(el=>el.remove());
    document.querySelectorAll('.ed-hit').forEach(el=>el.classList.remove('ed-hit','ed-sel'));
  }
  edRerender();
  edToastMsg(on?'편집 모드 ON — 이미지·카드·텍스트·팝업 전부 클릭해서 편집해':'편집 모드 OFF — 열람 모드');
}
document.getElementById('edToggle').addEventListener('click',()=>edSetActive(!ED.active));
document.getElementById('edSiteBtn').addEventListener('click',()=>{
  if(!ED.active)edSetActive(true);
  edOpenSitePanel();
});

document.getElementById('edLoadInput').addEventListener('change',e=>{
  if(e.target.files[0])edLoadHtmlFile(e.target.files[0]);
  e.target.value='';
});
document.getElementById('edGateLoad').addEventListener('change',async e=>{
  if(e.target.files[0]){
    const ok=await edLoadHtmlFile(e.target.files[0]);
    if(ok)edSetActive(true);
  }
  e.target.value='';
});
document.getElementById('edGateSelf').addEventListener('click',()=>{edUseSelf();edSetActive(true);});
document.getElementById('edFolderInput').addEventListener('change',e=>{
  if(e.target.files.length)edLoadFolder([...e.target.files]);
  e.target.value='';
});
document.getElementById('edCheckBtn').addEventListener('click',edIntegrity);
document.getElementById('edExpHtml').addEventListener('click',edExportHtml);
document.getElementById('edExpImgs').addEventListener('click',edExportImgs);
document.getElementById('edExpAll').addEventListener('click',edExportAll);

window.addEventListener('beforeunload',e=>{
  if(ED.dirty||ED.pendingImages.size){e.preventDefault();e.returnValue='';}
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('edPanel').classList.contains('open')){
    edClosePanel();
  }
},true);

/* 부팅: 사이트 텍스트 오버라이드 반영 */
edApplySiteText();

</script>
</body>
</html>
