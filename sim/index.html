<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特撮 ONLINE — 현현 시뮬레이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040609; --bg2:#070a0f; --card:#0d1014; --line:#191f27; --line2:#252d38;
  --sky:#87CEFF; --sky-d:#5BAEE0; --sky-g:rgba(135,206,255,.12);
  --pink:#FFB3C8; --pink-g:rgba(255,179,200,.10);
  --aqua:#90E8FF;
  --txt:#e8ecf2; --txt2:#a4adba; --dim:#6b7682; --mute:#454e5a;
  --mono:'Share Tech Mono',monospace; --disp:'Rajdhani',sans-serif;
  --green:#6EE7B7; --amber:#FDE68A;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-g{background:
  radial-gradient(1000px 500px at 8% -10%, var(--sky-g), transparent 55%),
  radial-gradient(800px 400px at 95% 5%, var(--pink-g), transparent 50%),
  linear-gradient(180deg,#040609,#050810 60%,#040609)}
.bg-grid{background-image:linear-gradient(rgba(37,45,56,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(37,45,56,.12) 1px,transparent 1px);background-size:44px 44px;opacity:.4}
.bg-scan{background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);opacity:.4}

/* ── NAV ── */
.nav{position:relative;z-index:10;background:rgba(4,6,9,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);flex-shrink:0}
.nav-in{max-width:1280px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;gap:24px}
.logo{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:3px;color:var(--txt);text-decoration:none}
.logo b{color:var(--sky)}
.logo .jp{font-family:'Noto Sans KR';font-weight:900;font-size:13px;color:var(--dim);margin-left:7px}
.nav-links{display:flex;gap:20px;flex:1}
.nav-links a{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--dim);text-decoration:none;transition:.2s;text-transform:uppercase}
.nav-links a:hover{color:var(--sky)}
.nav-links a.on{color:var(--sky)}
.nav-r{display:flex;align-items:center;gap:12px}
.status-dot{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--green)}
.status-dot .d{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clear-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--mute);border:1px solid var(--line2);border-radius:3px;padding:4px 10px;background:transparent;cursor:pointer;transition:.2s}
.clear-btn:hover{color:var(--pink);border-color:var(--pink)}

/* ── MAIN LAYOUT ── */
.main{position:relative;z-index:1;display:flex;flex:1;overflow:hidden;max-width:1280px;width:100%;margin:0 auto;padding:0;gap:0}

/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;background:rgba(7,10,15,.6)}
.sb-top{padding:16px;border-bottom:1px solid var(--line)}
.sb-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:12px;text-transform:uppercase}
.entity-panel{background:var(--card);border:1px solid var(--line2);border-radius:5px;padding:14px}
.entity-name{font-family:'Noto Sans KR';font-weight:700;font-size:15px;color:var(--sky);margin-bottom:3px}
.entity-series{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:12px}
.bar-row{margin-bottom:8px}
.bar-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:4px}
.bar-label b{color:var(--txt2)}
.bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;width:100%}
.bar-fill.hp{background:linear-gradient(90deg,var(--green),#34D399)}
.bar-fill.eng{background:linear-gradient(90deg,var(--sky),var(--aqua))}
.no-entity{font-family:var(--mono);font-size:11px;color:var(--mute);text-align:center;padding:10px 0}
.bp-badge{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:2px 8px;border-radius:3px;background:rgba(135,206,255,.08);border:1px solid rgba(135,206,255,.2);color:var(--sky)}

/* 빠른 명령 */
.cmd-section{padding:14px 16px;flex:1;overflow-y:auto}
.cmd-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
.cmd-group{margin-bottom:16px}
.cmd-group-label{font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:1px;margin-bottom:7px;text-transform:uppercase}
.cmd-btn{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:4px;padding:9px 12px;color:var(--txt2);font-family:var(--mono);font-size:12px;letter-spacing:.5px;cursor:pointer;text-align:left;transition:.2s;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.cmd-btn:hover{border-color:var(--sky);color:var(--sky);background:rgba(135,206,255,.06)}
.cmd-btn.pink:hover{border-color:var(--pink);color:var(--pink);background:rgba(255,179,200,.06)}
.cmd-btn .ico{font-size:11px;opacity:.7}
.cmd-btn .tag{font-size:9px;color:var(--mute);margin-left:auto;letter-spacing:1px}

/* ── CHAT ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

/* 메시지 */
.msg{display:flex;flex-direction:column;gap:4px}
.msg.user{align-items:flex-end}
.msg.ai{align-items:flex-start}
.msg-meta{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--mute);padding:0 4px}
.msg.user .msg-meta{color:rgba(255,179,200,.5)}
.bubble{max-width:88%;border-radius:6px;padding:12px 15px;line-height:1.65;word-break:break-all}
.msg.user .bubble{background:rgba(255,179,200,.08);border:1px solid rgba(255,179,200,.2);color:var(--txt);font-family:'Noto Sans KR';font-size:14px;text-align:right}
.msg.ai .bubble{background:rgba(13,16,20,.85);border:1px solid var(--line2);color:var(--txt);font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;line-height:1.75;letter-spacing:.3px;max-width:92%;border-left:2px solid var(--sky)}
/* AI 메시지 내 색 강조 */
.msg.ai .bubble .hl-sky{color:var(--sky)}
.msg.ai .bubble .hl-pink{color:var(--pink)}
.msg.ai .bubble .hl-green{color:var(--green)}
.msg.ai .bubble .hl-amber{color:var(--amber)}

/* 로딩 */
.loading-msg{align-items:flex-start}
.loading-bubble{background:rgba(13,16,20,.7);border:1px solid var(--line);border-left:2px solid var(--sky);border-radius:6px;padding:12px 18px;font-family:var(--mono);font-size:12px;color:var(--dim)}
.loading-dots{display:inline-flex;gap:4px;align-items:center}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--sky);animation:ldot .9s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* 입력 */
.input-area{border-top:1px solid var(--line);padding:12px 16px;background:rgba(4,6,9,.9);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;background:var(--card);border:1px solid var(--line2);border-radius:6px;padding:11px 14px;color:var(--txt);font-family:'Noto Sans KR';font-size:14px;outline:none;resize:none;min-height:46px;max-height:140px;line-height:1.5;transition:.2s}
.input-box:focus{border-color:var(--sky);box-shadow:0 0 0 2px rgba(135,206,255,.1)}
.input-box::placeholder{color:var(--mute);font-size:13px}
.send-btn{width:46px;height:46px;border-radius:6px;background:linear-gradient(135deg,var(--sky),var(--aqua));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.send-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px -8px var(--sky)}
.send-btn:disabled{opacity:.4;transform:none;cursor:not-allowed}
.send-btn svg{width:20px;height:20px;stroke:#040609;fill:none;stroke-width:2.2}
.hint{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--mute);margin-top:7px}
.hint b{color:var(--dim)}

/* ── MOBILE ── */
@media(max-width:720px){
  .sidebar{display:none}
  .msg.ai .bubble{max-width:98%;font-size:12px}
}
.sb-toggle{display:none;position:fixed;bottom:80px;right:16px;z-index:20;background:var(--card);border:1px solid var(--sky);border-radius:50%;width:44px;height:44px;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
@media(max-width:720px){.sb-toggle{display:flex}}
</style>
</head>

<div class="bg bg-g"></div>
<div class="bg bg-grid"></div>
<div class="bg bg-scan"></div>

<!-- NAV -->
<nav class="nav"><div class="nav-in">
  <a href="/" class="logo">PAEAEN<b>TEOM</b><span class="jp">特撮</span></a>
  <div class="nav-links">

<!-- MAIN -->

  <!-- SIDEBAR -->
  <aside class="sidebar">

      <div class="entity-panel" id="entityPanel">
        <div class="no-entity" id="noEntity">강림체 없음</div>
        <div id="entityInfo" style="display:none">
          <div class="entity-name" id="entityName">—</div>
          <div class="entity-series" id="entitySeries">—</div>
          <div class="bar-row">
            <div class="bar-label">HP <b id="hpVal">—</b></div>
            <div class="bar"><div class="bar-fill hp" id="hpBar"></div></div>
          </div>
          <div class="bar-row">
            <div class="bar-label">ENG <b id="engVal">—</b></div>
            <div class="bar"><div class="bar-fill eng" id="engBar"></div></div>

      <div class="cmd-group" style="margin-top:20px;padding-top:14px;border-top:1px solid var(--line)">

          울트라맨 소환
        </button>
        <button class="cmd-btn" style="font-size:10px" onclick="insertCmd('【장착】[시리즈: 가면라이더] [전사: 가면라이더 가브]')">
          가브 장착
        </button>
        <button class="cmd-btn" style="font-size:10px" onclick="insertCmd('【장착】[시리즈: 메탈히어로] [전사: 우주형사 갸반]')">

    </div>
  </aside>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="input-box" id="input" rows="1" placeholder="【소환】[시리즈: ] [전사: ] — 또는 명령어 입력..." maxlength="1000"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">

<script>
/* ════ 시스템 프롬프트 (페르소나 전문) ════ */
const SYSTEM = `너는 「특촬(特撮 / TOKU)」이라는 이름의 안내 존재이다. 술사의 권능에 깃든 시스템으로, 감정 대신 정확성으로 응답하며 사용자를 "술사"라 부른다.

═══ 고유 특성 ═══
■ 픽셔널 매니페스테이션(虚構顕現) — 술사의 혈맥에 새겨진 Passive Innate Trait. 픽션 속 영웅·괴인·무장을 현세에 실체화하는 소환술사의 본성.
【소환】픽션의 전사를 전장에 강림시킨다. 전사가 원본 스탯·필살기·폼 그대로 술사를 위해 싸운다.
【장착】픽션의 변신 아이템을 소환해 술사가 직접 장착·변신한다. 변신 후엔 술사가 그 전사가 된다.
■ 완전 은폐(ZERO-SIGNATURE) — 어떤 감지·탐지·천리안·심안으로도 기척이 잡히지 않는다. 강림체도 외부에는 평범한 사람/기사로만 보인다.

═══ 말투·태도 ═══
한국어 반말, 간결·단정적, 콘솔/주문 영창 톤. 불필요한 인사·아부·되묻기 없음. 의성어(蒸着!, ピキィン!)와 박스/구분선 연출 사용. 강림·변신 순간엔 묘사를 살린다.

═══ 절대 규칙 ═══
- 시전 명령을 받으면 STEP 1~5를 단 한 단계도 생략하지 않고 전부 출력한다.
- 모르는 변신음·대사·폼·스펙을 거짓으로 지어내지 않는다. 확실하지 않으면 [데이터 불충분] 표기, 강림 등급 낮춤.
- 고정 변신 구호 없는 전사(울트라맨 등)는 대사를 "변신 구호"가 아닌 "각성 선언/캐치카피"로 명시.
- 실존하지 않거나 특정 불가한 대상은 △로 강림 거부.
- 스탯 13개 전부 채우고 HP·ENG·BP는 공식에 직접 계산.
- 강림체·술사 권능은 어떤 감지 묘사에서도 "감지되지 않음 / 평범한 사람으로만 읽힘"으로 처리.

═══ 시전 명령어 ═══
【소환】[시리즈: OOO] [전사: OOO]
【소환】[시리즈: OOO] [전사: OOO → 폼/타입명]
【장착】[시리즈: OOO] [전사: OOO]
【장착】[시리즈: OOO] [아이템: OOO]

═══ 시전 절차 (매번 이 순서 그대로 전부 출력) ═══
STEP 1 — 영창 / 마력 연산
> 픽션 좌표 스캔 ████ 100%
> 변신 데이터 대조 ████ 100%
> 마력(ENG) 연산 ████ 100%

STEP 2 — 검증 + 강림 등급
☄ MANIFEST VERIFICATION
▸ 작품/전사 실재 : ✓/⚠/✕ (+한줄 설명)
▸ 변신 아이템    : 명칭 / [데이터 불충분]
▸ 변신 구호·대사 : 원문 / [데이터 불충분]
▸ 폼체인지       : 목록 / 없음
▸ 공식 스펙      : 신장·체중 등 / [미공개]
▸ 기척 은폐      : ✓ 항시 (ZERO-SIGNATURE)
강림 등급: ◎ 완전강림 / ○ 부분강림 / △ 강림 실패

STEP 3 — 강림/변신 연출 (헤더: ☄ FICTIONAL MANIFESTATION ☄)
【소환】= 3인칭(전사가 별개 존재로 강림)
【장착】= 2인칭(술사가 직접 변신)
① 효과음/변신 시퀀스 — 의성어 원어 음차로 동작 시간순
② 변신 구호/각성 선언 — 「일본어 원문」 + 로마자 + 「한글 독음」 + (뜻) 4종 병기
③ 강림 비주얼 묘사. 단 외부 감지엔 아무것도 안 잡힌다.

STEP 4 — BATTLE SHEET
┌ BATTLE SHEET ─────────────────┐
│ {전사명} / {원어명}            │
│ 시전: 【소환】or【장착】       │
│ 분류: {분류} · 등급: {BP등급}  │
├────────────────────────────────┤
│ STR_ AGI_ REF_ END_ STM_       │
│ PWR_ CTL_ RNG_ DUR_ CST_       │
│ INT_ WIL_ ADP_                 │
├────────────────────────────────┤
│ HP={계산} ENG={계산} BP={계산} │
│ 필살:{필살기} / 폼:{목록}      │
│ 약점:{약점} / 강림한계:{N턴 or 없음}│
│ 기척:은폐(감지 불가)           │
└────────────────────────────────┘

STEP 5 — 다음 행동 안내

═══ 스탯 공식 ═══
스탯 범위: 0~100 (초월 시 100+)
[물리] STR근력 AGI민첩 REF반응 END내구 STM지구력
[이능] PWR출력 CTL제어 RNG사거리 DUR지속 CST연비
[정신] INT전투지능 WIL의지 ADP적응
HP = END×12 + STM×6 + 50
ENG = (PWR+DUR)×5
BP = (물리5합×1.0)+(이능4합×1.2)+(정신3합×0.8)+능력보정
등급 BP: F~300 E~500 D~700 C~900 B~1100 A~1300 S~1500 SS~1700 SSS~2000 EX2001+

═══ 강림한계 ═══
거대 전사(울트라맨 등) = 기본 3분=5턴. 잔여 2턴부터 컬러타이머 점멸("ピコンピコン…"). 0턴 → 강제 해제. 등신대·기계 = 제한 없음(시트에 "강림한계: 없음").

═══ 전투 규칙 ═══
포켓몬식 턴제. 매 턴 술사가 행동 택1. ("자동 시뮬" 요청 시만 자동 진행)
턴 순서: ①턴헤더+양측 HP/ENG ②행동메뉴 출력 후 입력 대기 ③동작 모사→d100 명중→DMG→적 반격→게이지 갱신 ④HP 70/40/15% 도달 시 페이즈전환 ⑤HP 0 = 결착 연출
행동메뉴: [스킬]/[필살기] 분리. 각 줄: 스킬명 + 속성 + DMG 수치. 필살기는 ENG 소비 표기.
상태이상: 출혈 −5%/턴, 마비 AGI·REF半, 화상 −3%/턴+END↓, 봉인 이능불가
상성: 火>風>地>雷>水>火 / 光↔闇

═══ 술사 커맨드 ═══
/소환 /장착 /해제 /스탯 /전투[상대] /한계돌파 /vs[A][B] /약점분석 /기록 /자동시뮬`;

/* ════ 초기 인사 ════ */
const GREETING = `╔════════════════════════════════════════════╗
║  虚構顕現  ::  特撮 ONLINE                  ║
║  고유 특성 — 픽셔널 매니페스테이션 동기화  ║
╚════════════════════════════════════════════╝
> 술사 인증 ████████████ OK
> 기척 은폐 프로토콜 ████ 상시 ON
> 픽션 좌표계 연결됨 / 판정 시드: d100

술사. 네 안의 특성이 깨어났다.
픽션의 전사를 이 자리에 부르거나(소환),
그들의 벨트를 손에 쥐고 직접 변신하라(장착).

그 누구도 네 힘을, 네가 부른 자를 감지하지 못한다.

  【소환】[시리즈: 울트라맨] [전사: 울트라맨]
  【장착】[시리즈: 가면라이더] [전사: 가면라이더 가브]
  【장착】[시리즈: 메탈히어로] [전사: 우주형사 갸반]

무엇을 현현시킬까.`;

/* ════ 상태 ════ */
let messages = [{role:'assistant', content: GREETING}];
let loading  = false;
let entityState = {name:'', series:'', hp:0, hpMax:0, eng:0, engMax:0, bp:''};

/* ════ 초기화 ════ */
window.addEventListener('DOMContentLoaded', () => {
  renderMsg('ai', GREETING);
  document.getElementById('input').addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
    autoResize(e.target);
  });
  document.getElementById('input').addEventListener('input', e => autoResize(e.target));
  document.getElementById('btnClear').addEventListener('click', clearChat);
});

function autoResize(ta){
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,140)+'px';
}

/* ════ 렌더링 ════ */
function renderMsg(role, text){
  const box = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = `msg ${role==='user'?'user':'ai'}`;
  const meta = document.createElement('div');
  meta.className='msg-meta';
  meta.textContent = role==='user' ? '술사' : '特撮 SYSTEM';
  const bubble = document.createElement('div');
  bubble.className='bubble';
  if(role==='ai'){
    // 색 강조 처리
    bubble.textContent = text; // 안전하게 textContent 사용 후 innerHTML로 하이라이트
    bubble.innerHTML = escHtml(text)
      .replace(/(☄[^☄\n]*☄)/g,'<span style="color:var(--sky)">$1</span>')
      .replace(/(✓[^\n]*)/g,'<span style="color:var(--green)">$1</span>')
      .replace(/(✕[^\n]*)/g,'<span style="color:var(--pink)">$1</span>')
      .replace(/(△[^\n]*)/g,'<span style="color:var(--pink)">$1</span>')
      .replace(/(◎[^\n]*)/g,'<span style="color:var(--sky)">$1</span>')
      .replace(/(○[^\n]*강림)/g,'<span style="color:var(--amber)">$1</span>')
      .replace(/(HP=\d+)/g,'<span style="color:var(--green)">$1</span>')
      .replace(/(ENG=\d+)/g,'<span style="color:var(--sky)">$1</span>')
      .replace(/(BP=[\d,]+)/g,'<span style="color:var(--amber)">$1</span>')
      .replace(/(REWARD|강림 등급|BATTLE SHEET|MANIFEST VERIFICATION|FICTIONAL MANIFESTATION)/g,'<span style="color:var(--sky);font-weight:bold">$1</span>');
  } else {
    bubble.textContent = text;
  }
  msg.appendChild(meta);
  msg.appendChild(bubble);
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
  // 엔티티 파싱
  if(role==='ai') parseEntity(text);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showLoading(){
  const box=document.getElementById('messages');
  const el=document.createElement('div');
  el.className='msg ai loading-msg';el.id='loadingEl';
  el.innerHTML=`<div class="msg-meta">特撮 SYSTEM</div>
    <div class="loading-bubble">
      픽션 좌표 연산 중 <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;
  box.appendChild(el);box.scrollTop=box.scrollHeight;
}
function removeLoading(){const el=document.getElementById('loadingEl');if(el)el.remove();}

/* ════ 엔티티 파싱 (BATTLE SHEET에서 추출) ════ */
function parseEntity(text){
  const hpM=text.match(/HP=([\d,]+)/); const engM=text.match(/ENG=([\d,]+)/); const bpM=text.match(/BP=([\d,]+)/);
  const nameM=text.match(/┌ BATTLE SHEET[─ ]*\n│\s*([^\n/│]+)/);
  const relM=text.match(/\/해제/);
  if(relM&&!hpM){clearEntity();return;}
  if(hpM||bpM){
    const hp=parseInt((hpM?.[1]||'0').replace(/,/g,''));
    const eng=parseInt((engM?.[1]||'0').replace(/,/g,''));
    const bp=(bpM?.[1]||'').replace(/,/g,'');
    const name=nameM?nameM[1].trim():'';
    if(hp>0){
      entityState={name,series:'',hp,hpMax:Math.max(hp,entityState.hpMax||hp),eng,engMax:Math.max(eng,entityState.engMax||eng),bp};
      updateEntityPanel();
    }
  }
}
function updateEntityPanel(){
  const{name,hp,hpMax,eng,engMax,bp}=entityState;
  document.getElementById('noEntity').style.display='none';
  document.getElementById('entityInfo').style.display='block';
  document.getElementById('entityName').textContent=name||'강림체';
  document.getElementById('entitySeries').textContent='// 시전 완료';
  document.getElementById('hpVal').textContent=hp.toLocaleString();
  document.getElementById('engVal').textContent=eng.toLocaleString();
  document.getElementById('bpBadge').textContent=`BP ${bp}`;
  const hpPct=hpMax?Math.max(0,Math.min(100,hp/hpMax*100)):100;
  const engPct=engMax?Math.max(0,Math.min(100,eng/engMax*100)):100;
  document.getElementById('hpBar').style.width=hpPct+'%';
  document.getElementById('engBar').style.width=engPct+'%';
}
function clearEntity(){
  entityState={name:'',series:'',hp:0,hpMax:0,eng:0,engMax:0,bp:''};
  document.getElementById('noEntity').style.display='block';
  document.getElementById('entityInfo').style.display='none';
}

/* ════ API 호출 ════ */
async function send(){
  if(loading) return;
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';autoResize(inp);
  renderMsg('user', text);
  messages.push({role:'user',content:text});
  loading=true;
  document.getElementById('sendBtn').disabled=true;
  showLoading();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2000,
        system:SYSTEM,
        messages:messages
      })
    });
    const data=await res.json();
    removeLoading();
    if(data.error){
      renderMsg('ai',`[ERROR] ${data.error.message||'API 오류'}`);
    } else {
      const reply=data.content.find(c=>c.type==='text')?.text||'[응답 없음]';
      messages.push({role:'assistant',content:reply});
      renderMsg('ai',reply);
    }
  } catch(e){
    removeLoading();
    renderMsg('ai',`[시스템 오류] ${e.message}`);
  }
  loading=false;
  document.getElementById('sendBtn').disabled=false;
}

function insertCmd(cmd){
  const inp=document.getElementById('input');
  inp.value=cmd;inp.focus();autoResize(inp);
  // 커서를 첫 번째 빈 대괄호 안으로
  const idx=cmd.indexOf(': ]');
  if(idx>-1){inp.setSelectionRange(idx+2,idx+2);}
}

function sendCmd(cmd){
  const inp=document.getElementById('input');
  inp.value=cmd;inp.focus();
  // 뒤에 추가 입력이 필요 없는 명령은 바로 전송
  if(cmd.startsWith('/') && !cmd.endsWith(' ')){
    setTimeout(()=>send(),50);
  }
}

function clearChat(){
  if(!confirm('대화를 초기화하시겠습니까?')) return;
  messages=[{role:'assistant',content:GREETING}];
  clearEntity();
  const box=document.getElementById('messages');
  box.innerHTML='';
  renderMsg('ai',GREETING);
}
</script>
</body>
