<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特撮DEX — 토에이 · 츠부라야 현현 아카이브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root{
  --bg:#06080f; --bg2:#080b14; --panel:#0c1018; --panel2:#10141f;
  --line:#1a2231; --line2:#27324a;
  --ink:#eef2ff; --dim:#8b95b3; --faint:#525d7a; --mute:#39435c;
  --cyan:#87CEFF; --cyan-d:#5ba8e6; --pink:#FFB3C8; --pink-d:#e887a3;
  /* 시리즈 컬러 */
  --sentai:#23d98a; --rider:#b265ff; --metalhero:#3aa6ff; --projectred:#ff3358;
  --ishinomori:#ff8a44; --toeietc:#cda06f; --ultra:#ffc233; --gridman:#36dcff; --tsuetc:#ff4d9d;
  --acc:var(--cyan); --acc2:var(--pink);
  --disp:'Teko',sans-serif; --mono:'Share Tech Mono',monospace;
  --jp:'Noto Sans JP',sans-serif; --kr:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--kr);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
::selection{background:rgba(135,206,255,.3)}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* 배경 */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg.grad{background:
  radial-gradient(900px 520px at 14% -6%,rgba(135,206,255,.12),transparent 60%),
  radial-gradient(820px 520px at 88% 2%,rgba(255,179,200,.09),transparent 58%),
  linear-gradient(180deg,#05070e,#080b15 55%,#05070e)}
.bg.grid{background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 90% 70% at 50% 12%,#000 35%,transparent 100%)}
.bg.scan{background:repeating-linear-gradient(0deg,rgba(255,255,255,.014) 0 1px,transparent 1px 4px);opacity:.5}
#stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.05}50%{opacity:.5}}

/* ===== 네비게이션 (홈 버튼 상시) ===== */
.nav{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,rgba(6,8,15,.96),rgba(6,8,15,.84));backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-in{max-width:1240px;margin:0 auto;padding:0 22px;height:60px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;white-space:nowrap}
.brand .mk{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:1.5px;line-height:1;background:linear-gradient(110deg,#fff,var(--cyan) 55%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .jp{font-family:var(--jp);font-weight:700;font-size:13px;color:var(--faint);letter-spacing:2px}
.home-btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 15px 0 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;transition:.18s;text-decoration:none}
.home-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.home-btn:hover{color:var(--ink);border-color:var(--cyan-d);background:rgba(135,206,255,.07);box-shadow:0 0 0 1px rgba(135,206,255,.18)}
.crumb{flex:1;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.crumb a{color:var(--dim);cursor:pointer;transition:.15s}
.crumb a:hover{color:var(--cyan)}
.crumb .sep{color:var(--mute)}
.crumb .cur{color:var(--ink)}
.nav-rec{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--cyan);white-space:nowrap}
.nav-rec .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@media(max-width:680px){.nav-rec{display:none}.brand .jp{display:none}}

.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:0 22px}

/* ===== 뷰 전환 ===== */
.view{display:none;animation:vin .45s cubic-bezier(.16,1,.3,1)}
.view.active{display:block}
@keyframes vin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ===== 홈 헤더 ===== */
.hd{text-align:center;padding:54px 0 8px}
.hd .eye{font-family:var(--mono);font-size:12px;letter-spacing:.5em;color:var(--faint);text-transform:uppercase}
.hd h1{font-family:var(--disp);font-weight:700;font-size:clamp(46px,8vw,86px);line-height:1;margin-top:14px;background:linear-gradient(115deg,#fff,#d4dafc 42%,#8b93b5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hd h1 .jp{display:block;font-family:var(--jp);font-weight:700;font-size:.2em;line-height:1;letter-spacing:.34em;-webkit-text-fill-color:var(--dim);color:var(--dim);margin-bottom:1.1em}
.hd .lead{margin-top:14px;color:var(--dim);font-size:14px;line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto}
.hd .stats{margin-top:20px;display:inline-flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden;background:var(--panel)}
.hd .stats div{padding:8px 20px;font-size:12.5px;color:var(--dim);border-right:1px solid var(--line)}
.hd .stats div:last-child{border-right:none}
.hd .stats b{font-family:var(--mono);font-size:15px;color:var(--ink);margin-right:5px}

/* ===== 업데이트 스포트라이트 ===== */
.wrap-spot{margin:34px 0 4px}
.wrap-spot:empty{display:none}
.spot{--c:var(--acc);position:relative;border:1px solid var(--line2);border-radius:16px;overflow:hidden;
  background:linear-gradient(150deg,color-mix(in srgb,var(--c) 11%,var(--panel)),var(--bg) 125%);padding:22px 26px 24px}
.spot-h{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11.5px;letter-spacing:.28em;color:var(--dim);margin-bottom:18px}
.spot-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.spot-h .tag{color:var(--faint);letter-spacing:.3em}
.spot-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--c);border:1px solid color-mix(in srgb,var(--c) 45%,transparent);border-radius:7px;padding:5px 11px;background:color-mix(in srgb,var(--c) 10%,transparent)}
.spot-name{font-family:var(--jp);font-weight:700;font-size:32px;color:var(--ink);margin:12px 0 4px;line-height:1.1}
.spot-sub{font-family:var(--jp);font-size:13px;color:var(--faint);letter-spacing:.06em}
.spot-desc{margin-top:12px;color:var(--dim);font-size:14px;line-height:1.6;max-width:640px}
.spot-meta{position:absolute;top:24px;right:26px;text-align:right;font-family:var(--jp);font-size:12px;color:var(--faint);line-height:1.7}
.spot-foot{display:flex;align-items:center;gap:14px;margin-top:18px}
.spot-foot .ent{font-family:var(--mono);font-size:11.5px;letter-spacing:.18em;color:var(--dim)}
.spot-foot .ent b{color:var(--c);font-size:14px;margin-left:6px}
.spot-foot .bar{flex:1;max-width:240px;height:4px;border-radius:3px;background:var(--line);overflow:hidden;margin-left:auto}
.spot-foot .bar i{display:block;height:100%;width:60%;background:linear-gradient(90deg,var(--cyan),var(--pink))}
.spot{cursor:pointer;transition:.18s}
.spot:hover{border-color:color-mix(in srgb,var(--c) 50%,transparent)}

/* ===== 그룹/시리즈 (홈) ===== */
.group{padding:30px 0 8px}
.group-h{display:flex;align-items:baseline;gap:13px;padding:0 4px 14px;border-bottom:1px solid var(--line);margin-bottom:20px}
.group-h .jp{font-family:var(--jp);font-weight:700;font-size:26px;color:var(--ink)}
.group-h .en{font-family:var(--disp);font-weight:500;font-size:21px;letter-spacing:.14em;color:var(--faint)}
.group-h .ko{font-size:13px;color:var(--dim)}
.group-h .n{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
.group-h .n b{color:var(--dim)}

.series-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:880px){.series-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.series-grid{grid-template-columns:1fr}}

/* HSR풍 시리즈 카드 + 시그니처 브래킷 프레임 */
.scard{--c:var(--acc);position:relative;cursor:pointer;border:1px solid var(--line);border-radius:14px;background:
  linear-gradient(165deg,color-mix(in srgb,var(--c) 9%,var(--panel)),var(--bg) 130%);
  padding:24px 22px 20px;min-height:188px;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .34s cubic-bezier(.16,1,.3,1),border-color .3s,box-shadow .3s;
  opacity:0;transform:translateY(20px)}
.series-grid.in .scard{opacity:1;transform:none}
.scard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--c),transparent)}
.scard::after{content:"";position:absolute;inset:0;background:radial-gradient(420px 220px at 110% 120%,color-mix(in srgb,var(--c) 18%,transparent),transparent 60%);pointer-events:none}
.scard:hover{transform:translateY(-5px);border-color:color-mix(in srgb,var(--c) 45%,var(--line));box-shadow:0 24px 52px -24px color-mix(in srgb,var(--c) 60%,#000)}
.scard .crn{position:absolute;width:13px;height:13px;border:1.5px solid color-mix(in srgb,var(--c) 55%,var(--line2));opacity:0;transition:.3s}
.scard:hover .crn{opacity:1}
.scard .crn.tl{top:10px;left:10px;border-right:0;border-bottom:0}
.scard .crn.tr{top:10px;right:10px;border-left:0;border-bottom:0}
.scard .crn.bl{bottom:10px;left:10px;border-right:0;border-top:0}
.scard .crn.br{bottom:10px;right:10px;border-left:0;border-top:0}
.scard .en{font-family:var(--disp);font-weight:700;font-size:30px;line-height:.95;letter-spacing:.02em;color:var(--ink)}
.scard .jp{font-family:var(--jp);font-weight:500;font-size:13px;color:color-mix(in srgb,var(--c) 70%,var(--dim));margin-top:5px}
.scard .ko{font-weight:700;font-size:16px;margin-top:10px}
.scard .desc{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:9px;flex:1}
.scard .pill{margin-top:14px;display:inline-flex;align-self:flex-start;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--dim);border:1px solid var(--line2);border-radius:7px;padding:5px 10px;background:rgba(0,0,0,.2)}
.scard .pill b{color:var(--c)}
.scard .go{position:absolute;right:18px;bottom:18px;font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.1em;color:var(--c);opacity:0;transform:translateX(-6px);transition:.28s}
.scard:hover .go{opacity:1;transform:none}

/* ===== 시리즈 뷰 (작품 로스터) ===== */
.view-head{padding:34px 0 6px;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.view-head .vh-tag{font-family:var(--mono);font-size:11px;letter-spacing:.4em;color:var(--faint);text-transform:uppercase}
.view-head .vh-en{font-family:var(--disp);font-weight:700;font-size:clamp(38px,6vw,62px);line-height:.9;letter-spacing:.02em;background:linear-gradient(115deg,#fff,color-mix(in srgb,var(--acc) 70%,#fff));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.view-head .vh-jp{font-family:var(--jp);font-weight:500;font-size:14px;color:var(--dim);margin-top:4px}
.view-head .vh-ko{font-weight:700;font-size:17px;margin-top:2px}
.view-head .vh-desc{flex:1;min-width:240px;color:var(--dim);font-size:13px;line-height:1.65;max-width:440px}

/* 시대 필터 칩 (cyberpunk roster style) */
.era-bar{display:flex;gap:8px;flex-wrap:wrap;margin:26px 0 22px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.era-chip{font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:8px 15px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);cursor:pointer;transition:.16s}
.era-chip:hover{color:var(--ink);border-color:var(--acc)}
.era-chip.on{color:var(--bg);background:var(--acc);border-color:var(--acc);font-weight:700}
.era-chip .c{margin-left:6px;opacity:.65}

/* 작품/캐릭터 로스터 그리드 */
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:15px}
@media(max-width:560px){.roster{grid-template-columns:repeat(2,1fr);gap:11px}}
.rcard{--c:var(--acc);position:relative;cursor:pointer;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--panel);transition:transform .3s cubic-bezier(.16,1,.3,1),border-color .25s,box-shadow .25s}
.rcard:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--c) 50%,var(--line));box-shadow:0 18px 40px -22px color-mix(in srgb,var(--c) 65%,#000)}
.rcard .thumb{position:relative;aspect-ratio:3/4;overflow:hidden;background:linear-gradient(155deg,color-mix(in srgb,var(--c) 22%,var(--panel2)),var(--bg) 120%);display:grid;place-items:center}
.rcard .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.rcard:hover .thumb img{transform:scale(1.05)}
.rcard .thumb .ph{font-family:var(--disp);font-weight:700;font-size:48px;color:color-mix(in srgb,var(--c) 60%,var(--faint))}
.rcard .thumb::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 1px,transparent 1px 3px);opacity:.5;pointer-events:none}
.rcard .crail{position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--c),transparent 85%);z-index:2}
.rcard .no{position:absolute;top:8px;right:8px;z-index:3;font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:#cdd6ee;background:rgba(6,8,15,.7);border:1px solid var(--line2);border-radius:5px;padding:3px 7px;backdrop-filter:blur(4px)}
.rcard .dot{position:absolute;top:8px;left:11px;z-index:3;width:10px;height:10px;border-radius:50%;border:2px solid rgba(6,8,15,.8);box-shadow:0 0 7px currentColor}
.rcard .ep{position:absolute;bottom:8px;left:8px;z-index:3;font-family:var(--mono);font-size:10px;color:#cdd6ee;background:rgba(6,8,15,.72);border-radius:5px;padding:2px 7px;backdrop-filter:blur(4px)}
.rcard .tag{position:absolute;top:8px;left:11px;z-index:4;font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;font-weight:700;border-radius:4px;padding:2px 6px;text-transform:uppercase}
.rcard .tag.ex{background:#3a2c00;color:#ffce4d;border:1px solid #6b5200}
.rcard .tag.dispute{background:#3a1a1a;color:#ff8a8a;border:1px solid #6b2f2f}
.rcard .tag.new2026{background:#0a3a2a;color:#4dffb0;border:1px solid #1a6b4d}
.rcard .tag.anime{background:#2a1a3a;color:#c98aff;border:1px solid #4f2f6b}
.rcard .meta{padding:11px 12px 13px}
.rcard .nm{font-weight:700;font-size:14px;line-height:1.25}
.rcard .jp{font-family:var(--jp);font-size:11px;color:var(--dim);margin-top:3px;line-height:1.3}
.rcard .sub{font-size:11px;color:var(--faint);margin-top:6px;line-height:1.4}
.rcard.clk::before{content:"";position:absolute;inset:0;border:1px solid transparent;border-radius:13px;transition:.25s;pointer-events:none;z-index:5}
.rcard.clk:hover::before{border-color:color-mix(in srgb,var(--c) 40%,transparent);box-shadow:inset 0 0 24px -10px color-mix(in srgb,var(--c) 60%,transparent)}

/* ===== 작품 뷰 ===== */
.w-banner{position:relative;margin-top:30px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(150deg,color-mix(in srgb,var(--acc) 14%,var(--panel)),var(--bg) 130%);min-height:200px;display:flex;align-items:flex-end}
.w-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 280px at 90% 120%,color-mix(in srgb,var(--acc) 16%,transparent),transparent 60%)}
.w-banner .bimg{position:absolute;inset:0;z-index:0}
.w-banner .bimg img{width:100%;height:100%;object-fit:cover;opacity:.42;mask-image:linear-gradient(90deg,transparent,#000 50%)}
.w-banner .cap{position:relative;z-index:2;padding:28px 30px}
.w-banner .cap .no{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--acc)}
.w-banner .cap .ko{font-family:var(--kr);font-weight:900;font-size:clamp(26px,4.4vw,40px);line-height:1.05;margin-top:6px}
.w-banner .cap .jp{font-family:var(--jp);font-weight:500;font-size:14px;color:var(--dim);margin-top:5px}
.w-banner .btag{position:absolute;top:16px;right:18px;z-index:3;font-family:var(--mono);font-size:10px;letter-spacing:.5px;font-weight:700;border-radius:5px;padding:4px 9px;text-transform:uppercase}
.w-banner .btag.ex{background:#3a2c00;color:#ffce4d}
.w-banner .btag.dispute{background:#3a1a1a;color:#ff8a8a}
.w-banner .btag.new2026{background:#0a3a2a;color:#4dffb0}
.w-banner .btag.anime{background:#2a1a3a;color:#c98aff}

/* 카테고리 탭 */
.w-tabs{display:flex;gap:4px;flex-wrap:wrap;margin:22px 0 0;border-bottom:1px solid var(--line)}
.w-tab{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.16s;position:relative;top:1px}
.w-tab:hover{color:var(--ink)}
.w-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.w-tab .ic{font-size:14px}
.w-tab .cnt{font-family:var(--mono);font-size:10px;color:var(--bg);background:var(--faint);border-radius:99px;padding:1px 6px;min-width:18px;text-align:center}
.w-tab.on .cnt{background:var(--acc)}

.pane{display:none;padding-top:22px}
.pane.on{display:block;animation:vin .35s}

.empty{text-align:center;padding:54px 20px;color:var(--dim)}
.empty .ic{font-size:40px;opacity:.4}
.empty .t{font-weight:700;font-size:15px;margin-top:12px;color:var(--ink)}
.empty .d{font-size:13px;color:var(--faint);margin-top:7px;line-height:1.6}

/* 정보 그리드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:13px;overflow:hidden;max-width:720px}
@media(max-width:560px){.info-grid{grid-template-columns:1fr}}
.info-grid .cell{background:var(--panel);padding:14px 16px}
.info-grid .cell.full{grid-column:1/-1}
.info-grid .k{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;margin-bottom:5px}
.info-grid .v{font-size:14px;line-height:1.55}
.info-grid .v.sum{color:var(--dim);font-size:13.5px;line-height:1.75}

/* ===== 모달 (도시에 카드) ===== */
.modal-bd{position:fixed;inset:0;z-index:100;background:rgba(4,5,11,.78);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:24px}
.modal-bd.open{display:flex;animation:vin .25s}
.modal{position:relative;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:0 30px 80px -30px #000}
.modal::-webkit-scrollbar{width:8px}.modal::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.modal .x{position:absolute;top:13px;right:13px;z-index:6;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:rgba(6,8,15,.6);color:#fff;font-size:19px;display:grid;place-items:center;transition:.18s}
.modal .x:hover{background:var(--pink-d)}

/* ===== 헬퍼 ===== */
function getSeries(key){for(const g of Object.values(DATA))if(g.series&&g.series[key])return g.series[key];return null;}
function getSeriesGroup(key){for(const g of Object.values(DATA))if(g.series&&g.series[key])return g;return null;}
function seriesTotal(s){return s.eras.reduce((a,e)=>a+e.works.filter(w=>!w._todo).length,0);}
function esc(s){return String(s==null?'':s);}

/* 별 배경 */
(function(){let h='';for(let i=0;i<64;i++)h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s"></i>`;document.getElementById('stars').innerHTML=h;})();

/* 누적 통계 */
function totalStats(){
  let works=0,series=0,heroes=0,kaiju=0;
  for(const g of Object.values(DATA))for(const k in g.series){series++;const s=g.series[k];
    for(const e of s.eras)for(const w of e.works){works++;heroes+=(w.members||[]).length;kaiju+=(w.kaiju||[]).length;}}
  return {works,series,heroes,kaiju};
}

/* ===== 홈 렌더 ===== */
function renderHome(){
  const st=totalStats();
  document.getElementById('home-stats').innerHTML=
    `<div><b>${st.series}</b>시리즈</div><div><b>${st.works}</b>작품</div><div><b>${st.heroes}</b>영웅</div><div><b>${st.kaiju}</b>괴수</div>`;
  renderSpotlight();
  const root=document.getElementById('groups');
  root.innerHTML=Object.values(DATA).map(g=>{
    const keys=Object.keys(g.series);
    const gWorks=keys.reduce((a,k)=>a+seriesTotal(g.series[k]),0);
    const cards=keys.map(k=>{
      const s=g.series[k];const total=seriesTotal(s);
      return `<div class="scard" style="--c:var(--${s.c})" tabindex="0" role="button"
        onclick="showSeries('${k}')" onkeydown="if(event.key==='Enter')showSeries('${k}')">
        <span class="crn tl"></span><span class="crn tr"></span><span class="crn bl"></span><span class="crn br"></span>
        <div class="en">${esc(s.en)}</div>
        <div class="jp">${esc(s.jp)}</div>
        <div class="ko">${esc(s.ko)}</div>
        <div class="desc">${esc(s.desc||'')}</div>
        <div class="pill">作品 <b>${total}</b></div>
        <div class="go">열람 →</div>
      </div>`;
    }).join('');
    return `<section class="group">
      <div class="group-h">
        <span class="jp">${esc(g.jp)}</span><span class="en">${esc(g.en)}</span><span class="ko">${esc(g.ko)}</span>
        <span class="n"><b>${keys.length}</b> SERIES · <b>${gWorks}</b> WORKS</span>
      </div>
      <div class="series-grid">${cards}</div>
    </section>`;
  }).join('');
  requestAnimationFrame(()=>document.querySelectorAll('.series-grid').forEach(el=>el.classList.add('in')));
}

/* ===== 업데이트 스포트라이트: 데이터(작품) 있을 때만 표시 ===== */
function renderSpotlight(){
  const box=document.getElementById('spotlight');
  if(!box)return;
  // 작품이 들어있는 시리즈만 후보로
  const cands=[];
  for(const g of Object.values(DATA))for(const k in g.series){
    const s=g.series[k];
    const works=[];s.eras.forEach(e=>e.works.forEach(w=>{if(!w._todo)works.push(w);}));
    if(works.length)cands.push({k,s,g,works});
  }
  if(!cands.length){box.innerHTML='';return;}   // 데이터 없으면 아무것도 안 나옴
  // 가장 최근 작품(year 큰 값) 보유 시리즈를 스포트라이트로
  cands.forEach(c=>{c.latest=Math.max(...c.works.map(w=>parseInt(w.year)||0));});
  cands.sort((a,b)=>b.latest-a.latest);
  const {k,s,g,works}=cands[0];
  const lead=works.slice().sort((a,b)=>(parseInt(b.year)||0)-(parseInt(a.year)||0))[0];
  const entries=s.eras.reduce((a,e)=>a+e.works.filter(w=>!w._todo).reduce((x,w)=>x+1+(w.members||[]).length+(w.kaiju||[]).length,0),0);
  box.innerHTML=`
    <div class="spot" style="--c:var(--${s.c})" onclick="showSeries('${k}')">
      <div class="spot-h"><span class="tag">// UPDATE</span><span class="ln"></span></div>
      <div class="spot-meta">${esc(g.jp)} ${esc(g.ko)}<br>${esc(s.jp)}</div>
      <div class="spot-badge">★ ${esc(s.en)}</div>
      <div class="spot-name">${esc(lead?lead.ko:s.ko)}</div>
      <div class="spot-sub">${esc(lead?(lead.jp+(lead.year?' · '+lead.year:'')):s.jp)}</div>
      <div class="spot-desc">${esc(lead&&lead.summary?lead.summary:(s.desc||''))}</div>
      <div class="spot-foot">
        <span class="ent">ENTRIES:<b>${entries}</b></span>
        <span class="bar"><i></i></span>
      </div>
    </div>`;
}
let curSeriesKey=null, curEra='all';
function showSeries(key,fromRoute){
  const s=getSeries(key);if(!s)return showHome();
  curSeriesKey=key;curEra='all';
  setAccent(s.c);
  if(!fromRoute)pushURL(dbBase()+key+'/');
  setCrumb([{t:'HOME',fn:'showHome()'},{t:s.en,cur:true}]);
  document.getElementById('series-head').innerHTML=`
    <div>
      <div class="vh-tag">SERIES INDEX</div>
      <div class="vh-en">${esc(s.en)}</div>
      <div class="vh-jp">${esc(s.jp)}</div>
      <div class="vh-ko">${esc(s.ko)}</div>
    </div>
    <div class="vh-desc">${esc(s.desc||'')}</div>`;
  // 시대 칩
  const eras=s.eras.filter(e=>e.works.length);
  const chips=[`<div class="era-chip on" onclick="filterEra('all',this)">전체 <span class="c">${seriesTotal(s)}</span></div>`]
    .concat(eras.map((e,i)=>`<div class="era-chip" onclick="filterEra('${e.id||i}',this)">${esc(e.label)} <span class="c">${e.works.filter(w=>!w._todo).length}</span></div>`));
  document.getElementById('era-bar').innerHTML=chips.join('');
  renderRoster(s,'all');
  document.getElementById('series-foot').innerHTML=`${esc(s.en)} · ${seriesTotal(s)} WORKS · 작품을 선택하면 영웅·괴수·무장·장비·폼이 펼쳐집니다`;
  switchView('view-series');window.scrollTo({top:0});
}
function filterEra(id,el){
  curEra=id;
  document.querySelectorAll('#era-bar .era-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderRoster(getSeries(curSeriesKey),id);
}
function renderRoster(s,eraId){
  const out=[];
  s.eras.forEach((e,eIdx)=>{
    if(eraId!=='all' && (e.id||eIdx)!=String(eraId)) return;
    e.works.forEach((w,wi)=>{
      if(w._todo)return;
      out.push(workCard(s,w,eIdx,wi));
    });
  });
  document.getElementById('series-body').innerHTML=
    `<div class="roster">${out.join('')}</div>`;
}
function workCard(s,w,eIdx,wi){
  const img=w.img?`<img src="${w.img}" alt="${esc(w.ko)}" loading="lazy">`
    :`<span class="ph">${(esc(w.no).replace(/[^0-9]/g,'')||esc(w.ko)[0]||'?')}</span>`;
  const tag=w.tag?`<span class="tag ${w.tag}">${tagLabel(w.tag)}</span>`
    :`<span class="dot" style="color:var(--${s.c})"></span>`;
  const sub=[w.year,w.motif].filter(Boolean).join(' · ');
  return `<div class="rcard clk" style="--c:var(--${s.c})"
    onclick="openWork('${curSeriesKey}',${eIdx},${wi})">
    <div class="thumb"><span class="crail"></span>${tag}<span class="no">${esc(w.no||'—')}</span>${img}</div>
    <div class="meta"><div class="nm">${esc(w.ko)}</div><div class="jp">${esc(w.jp)}</div>${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>
  </div>`;
}

/* ===== 작품 뷰 ===== */
const CAT=[
  {id:'heroes', key:'members', label:'영웅', ic:'🦸', def:{sentai:'전사',rider:'라이더',metalhero:'메탈히어로',ultra:'울트라전사',gridman:'전사',projectred:'전사',ishinomori:'히어로',toeietc:'히어로',tsuetc:'전사'}},
  {id:'kaiju',  key:'kaiju',   label:'괴수', ic:'👾', def:{}},
  {id:'arsenal',key:'arsenal', label:'무장', ic:'⚔️', def:{}},
  {id:'machines',key:'machines',label:'장비', ic:'🤖', def:{rider:'머신·장비',sentai:'메카·로봇',ultra:'장비·메카',metalhero:'장비·메카'}},
  {id:'forms',  key:'_forms',  label:'폼',   ic:'🔥', def:{}},
  {id:'org',    key:'orgs',    label:'조직', ic:'🛡️', def:{}},
];
let curWork=null;
function openWork(key,eIdx,wi,fromRoute){
  const s=getSeries(key);if(!s)return showHome();
  const w=s.eras[eIdx].works[wi];if(!w)return showSeries(key);
  curWork={key,eIdx,wi};
  setAccent(s.c);
  if(!fromRoute)pushURL(dbBase()+key+'/'+workSlug(w,eIdx,wi)+'/');
  setCrumb([{t:'HOME',fn:'showHome()'},{t:s.en,fn:`showSeries('${key}')`},{t:w.ko,cur:true}]);

  // 폼 = 영웅들의 imgAlt/skills를 폼으로 집계
  const forms=collectForms(w);

  // 배너
  const bimg=w.img?`<div class="bimg"><img src="${w.img}" alt=""></div>`:'';
  const btag=w.tag?`<span class="btag ${w.tag}">${tagLabel(w.tag)}</span>`:'';
  document.getElementById('w-banner').innerHTML=`${bimg}${btag}
    <div class="cap"><div class="no">${esc(s.ko)} · ${esc(w.no||'')} · ${esc(w.year||'')}</div>
    <div class="ko">${esc(w.ko)}</div><div class="jp">${esc(w.jp)}</div></div>`;

  // 탭 (데이터 있는 것 + 폼 + 항상 정보)
  const counts={heroes:(w.members||[]).length,kaiju:(w.kaiju||[]).length,arsenal:(w.arsenal||[]).length,
    machines:(w.machines||[]).length,forms:forms.length,org:(w.orgs||[]).length};
  const tabs=CAT.filter(c=>counts[c.id]>0).map(c=>({...c,n:counts[c.id]}));
  tabs.push({id:'info',label:'정보',ic:'📋',n:null});
  document.getElementById('w-tabs').innerHTML=tabs.map((t,i)=>
    `<div class="w-tab ${i===0?'on':''}" onclick="switchTab(${i})"><span class="ic">${t.ic}</span>${t.label}${t.n!=null?`<span class="cnt">${t.n}</span>`:''}</div>`
  ).join('');

  // 패널
  document.getElementById('w-body').innerHTML=tabs.map((t,i)=>{
    if(t.id==='info')return `<div class="pane ${i===0?'on':''}" data-i="${i}">${paneInfo(w)}</div>`;
    if(t.id==='forms')return `<div class="pane ${i===0?'on':''}" data-i="${i}">${paneForms(forms,key,eIdx,wi)}</div>`;
    const list=w[t.key]||[];
    return `<div class="pane ${i===0?'on':''}" data-i="${i}">${paneCards(t,list,key,eIdx,wi)}</div>`;
  }).join('');

  switchView('view-work');window.scrollTo({top:0});
}
function switchTab(i){
  document.querySelectorAll('#w-tabs .w-tab').forEach((b,j)=>b.classList.toggle('on',i===j));
  document.querySelectorAll('#w-body .pane').forEach((p,j)=>p.classList.toggle('on',i===j));
}
function catLabel(cat,c){return (cat.def&&cat.def[c])||cat.label;}

function paneCards(cat,list,key,eIdx,wi){
  if(!list.length)return emptyPane(cat.ic,cat.label);
  const cards=list.map((it,i)=>{
    const click=cat.id==='heroes'?`openHero('${key}',${eIdx},${wi},${i})`:`openEntity('${key}',${eIdx},${wi},'${cat.id}',${i})`;
    return entCard(it,click,i+1,cat.id);
  }).join('');
  return `<div class="roster">${cards}</div>`;
}
function entCard(it,click,num,catId){
  const thumb=(it.media&&it.media.src)?mediaInner(it.media)
    :(it.img||it.photo)?`<img src="${it.img||it.photo}" alt="${esc(it.name)}" loading="lazy">`
    :`<span class="ph">${esc((it.name||'?')[0])}</span>`;
  const rail=it.color?`<span class="crail" style="background:linear-gradient(180deg,${it.color},transparent 85%)"></span>`:`<span class="crail"></span>`;
  const dot=it.color?'':`<span class="dot" style="color:var(--acc)"></span>`;
  const no=`<span class="no">No.${String(num).padStart(3,'0')}</span>`;
  const ep=it.ep?`<span class="ep">${esc(it.ep)}</span>`:'';
  const sub=it.sub||it.cat||'';
  return `<div class="rcard clk" onclick="${click}">
    <div class="thumb">${rail}${dot}${no}${ep}${thumb}</div>
    <div class="meta"><div class="nm">${esc(it.name)}</div>${it.jp?`<div class="jp">${esc(it.jp)}</div>`:''}${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>
  </div>`;
}
function emptyPane(ic,label){
  return `<div class="empty"><div class="ic">${ic}</div>
    <div class="t">${label} — 등록된 항목 없음</div>
    <div class="d">이 작품에는 아직 ${label} 데이터가 채워지지 않았습니다.<br>리서치로 채우면 카드가 자동 표시됩니다.</div></div>`;
}

/* 폼: 영웅별 기본폼 + 변신폼(imgAlt) 집계 */
function collectForms(w){
  const forms=[];
  (w.members||[]).forEach((h,hi)=>{
    if(h.person)return;
    forms.push({hi,name:h.name,jp:h.jp,img:h.img,color:h.color,sub:'기본 폼',kind:'base'});
    if(h.imgAlt)forms.push({hi,name:`${h.name} · ${h.imgAltLabel||'다른 모습'}`,jp:h.jp,img:h.imgAlt,color:h.color,sub:h.imgAltLabel||'변신/은폐 폼',kind:'alt'});
  });
  return forms;
}
function paneForms(forms,key,eIdx,wi){
  if(!forms.length)return emptyPane('🔥','폼');
  const cards=forms.map((f,i)=>{
    const thumb=f.img?`<img src="${f.img}" alt="${esc(f.name)}" loading="lazy">`:`<span class="ph">${esc((f.name||'?')[0])}</span>`;
    const rail=f.color?`<span class="crail" style="background:linear-gradient(180deg,${f.color},transparent 85%)"></span>`:`<span class="crail"></span>`;
    return `<div class="rcard clk" onclick="openHero('${key}',${eIdx},${wi},${f.hi})">
      <div class="thumb">${rail}<span class="no">${esc(f.sub)}</span>${thumb}</div>
      <div class="meta"><div class="nm">${esc(f.name)}</div>${f.jp?`<div class="jp">${esc(f.jp)}</div>`:''}</div>
    </div>`;
  }).join('');
  return `<div class="roster">${cards}</div>`;
}

function paneInfo(w){
  const cell=(k,v,full)=>(v&&v!=='—')?`<div class="cell${full?' full':''}"><div class="k">${k}</div><div class="v${full?' sum':''}">${esc(v)}</div></div>`:'';
  const heroesTxt=(typeof w.heroes==='string')?w.heroes:'';
  return `<div class="info-grid">
    ${cell('방영기간',w.year)}
    ${cell('포맷',w.format)}
    ${cell('주역',heroesTxt)}
    ${cell('모티프',w.motif)}
    ${cell('대표 변신아이템',w.item,true)}
    ${cell('개요',w.summary,true)}
  </div>`;
}

/* ===== 미디어 ===== */
function ytId(u){const m=String(u).match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);return m?m[1]:u;}
function mediaInner(m){
  if(m.type==='video')return `<video src="${m.src}" controls playsinline></video>`;
  if(m.type==='youtube')return `<iframe src="https://www.youtube.com/embed/${ytId(m.src)}" allowfullscreen></iframe>`;
  return `<img src="${m.src}" alt="" loading="lazy">`;
}
function mediaSlot(m,ph){
  if(!m||!m.src)return `<div class="media"><span class="mph">${ph||'미디어 준비 중'}</span></div>`;
  return `<div class="media">${mediaInner(m)}</div>`;
}

/* ===== 모달 ===== */
function openModal(html){
  document.getElementById('modal').innerHTML=html;
  document.getElementById('modal-bd').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modal').scrollTop=0;
}
function closeModal(){document.getElementById('modal-bd').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleHeroImg(btn){
  const hero=btn.closest('.m-hero');
  const base=hero.querySelector('.hImg-base'),alt=hero.querySelector('.hImg-alt');
  if(!alt)return;
  const showAlt=base.style.display!=='none';
  base.style.display=showAlt?'none':'block';
  alt.style.display=showAlt?'block':'none';
  btn.classList.toggle('on',showAlt);
}
function openHero(key,eIdx,wi,hi){
  const w=getSeries(key).eras[eIdx].works[wi];
  const h=(w.members||[])[hi];if(!h)return;
  const rail=h.color?`<span class="crail" style="background:linear-gradient(180deg,${h.color},transparent 85%)"></span>`:`<span class="crail" style="background:var(--acc)"></span>`;
  if(h.person){
    const pimg=h.img?`<img src="${h.img}" alt="${esc(h.name)}">`:`<span class="ph">${esc((h.name||'?')[0])}</span>`;
    openModal(`<button class="x" onclick="closeModal()">×</button>
      <div class="m-hero entity">${rail}${pimg}</div>
      <div class="m-body">
        <div class="m-kicker">인물 · 변신자</div>
        <div class="m-nm">${esc(h.name)}</div>
        ${h.jp?`<div class="m-jp">${esc(h.jp)}</div>`:''}
        ${h.sub?`<div class="m-chips"><span class="m-chip">${esc(h.sub)}</span></div>`:''}
        ${h.desc?`<p class="m-desc">${esc(h.desc)}</p>`:''}
        <div class="m-sec"><div class="m-sec-h">🎬 미디어</div>${mediaSlot(h.media,'사진·영상')}</div>
      </div>`);
    return;
  }
  const hasAlt=!!h.imgAlt;
  const img=h.img
    ?`<img class="hImg-base" src="${h.img}" alt="${esc(h.name)}">`+(hasAlt?`<img class="hImg-alt" src="${h.imgAlt}" alt="" style="display:none">`:'')
    :`<span class="ph">${esc((h.name||'?')[0])}</span>`;
  const cloak=hasAlt?`<button class="cloak-btn" onclick="toggleHeroImg(this)" title="${esc(h.imgAltLabel||'다른 모습')}"><img src="${CLOAK_ICON}" alt=""></button>`:'';
  const chips=[h.sub?`<span class="m-chip acc">변신자 · ${esc(h.sub)}</span>`:'',
    h.item&&h.item!=='—'?`<span class="m-chip">🔧 ${esc(h.item)}</span>`:''].filter(Boolean).join('');
  const skills=h.skills||[];
  const skillList=skills.length
    ?skills.map(s=>`<li><div class="sk-nm">${esc(s.name)}${s.jp?`<span>${esc(s.jp)}</span>`:''}</div>${s.desc?`<div class="sk-d">${esc(s.desc)}</div>`:''}${(s.media&&s.media.src)?`<div style="margin-top:8px">${mediaSlot(s.media)}</div>`:''}</li>`).join('')
    :`<li class="empty">스킬·필살기 데이터 준비 중</li>`;
  openModal(`<button class="x" onclick="closeModal()">×</button>
    <div class="m-hero">${rail}${cloak}${img}</div>
    <div class="m-body">
      <div class="m-kicker">HERO</div>
      <div class="m-nm">${esc(h.name)}</div>
      ${h.jp?`<div class="m-jp">${esc(h.jp)}</div>`:''}
      ${chips?`<div class="m-chips">${chips}</div>`:''}
      ${h.desc?`<p class="m-desc">${esc(h.desc)}</p>`:''}
      <div class="m-sec"><div class="m-sec-h">✨ 변신</div>${mediaSlot(h.henshin,'변신 GIF·영상')}</div>
      <div class="m-sec"><div class="m-sec-h">스펙</div>
        <div class="m-row"><span class="k">🔧 변신 아이템</span><span class="v ${h.item&&h.item!=='—'?'':'dim'}">${(h.item&&h.item!=='—')?esc(h.item):'준비 중'}</span></div>
        <div class="m-row"><span class="k">🤖 전용 메카·탈것</span><span class="v ${h.mecha&&h.mecha!=='—'?'':'dim'}">${(h.mecha&&h.mecha!=='—')?esc(h.mecha):'준비 중'}</span></div>
      </div>
      <div class="m-sec"><div class="m-sec-h">⚡ 스킬 · 필살기 <span class="cnt">${skills.length}</span></div>
        <ul class="m-skills">${skillList}</ul></div>
    </div>`);
}
function openEntity(key,eIdx,wi,type,idx){
  const w=getSeries(key).eras[eIdx].works[wi];
  const map={arsenal:w.arsenal,machines:w.machines,kaiju:w.kaiju,org:w.orgs};
  const list=map[type]||[];const it=list[idx];if(!it)return;
  const kicker={arsenal:'⚔️ 무장 · 무기',machines:'🤖 장비 · 메카',kaiju:'👾 괴수 · 우주인',org:'🛡️ 조직 · 집단'}[type];
  const vis=(it.media&&it.media.src)?mediaInner(it.media)
    :(it.photo||it.img)?`<img src="${it.photo||it.img}" alt="${esc(it.name)}">`
    :`<span class="ph">${esc((it.name||'?')[0])}</span>`;
  const rail=it.color?`<span class="crail" style="background:linear-gradient(180deg,${it.color},transparent 85%)"></span>`:`<span class="crail" style="background:var(--acc)"></span>`;
  const chips=[it.cat?`<span class="m-chip">${esc(it.cat)}</span>`:'',it.ep?`<span class="m-chip acc">${esc(it.ep)}</span>`:''].filter(Boolean).join('');
  const specs=[it.spec?`<div class="m-spec">📐 ${esc(it.spec)}</div>`:'',
    it.defeat?`<div class="m-spec">💥 결정타 · ${esc(it.defeat)}</div>`:'',
    it.suit?`<div class="m-spec">🎭 슈트 유용 · ${esc(it.suit)}</div>`:''].filter(Boolean).join('');
  const body=it.desc||it.sub||'';
  openModal(`<button class="x" onclick="closeModal()">×</button>
    <div class="m-hero entity">${rail}${vis}</div>
    <div class="m-body">
      <div class="m-kicker">${kicker}</div>
      <div class="m-nm">${esc(it.name)}</div>
      ${it.jp?`<div class="m-jp">${esc(it.jp)}</div>`:''}
      ${chips?`<div class="m-chips">${chips}</div>`:''}
      ${specs?`<div class="m-specs">${specs}</div>`:''}
      ${body?`<p class="m-desc">${esc(body)}</p>`:''}
      <div class="m-sec"><div class="m-sec-h">🎬 미디어</div>${mediaSlot(it.media,'GIF · 이미지 · 영상')}</div>
    </div>`);
}

/* ===== UI 유틸 ===== */
function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setAccent(c){const r=document.documentElement.style;r.setProperty('--acc',`var(--${c})`);}
function setCrumb(items){
  document.getElementById('crumb').innerHTML=items.map((it,i)=>{
    const node=it.cur?`<span class="cur">${esc(it.t)}</span>`:`<a onclick="${it.fn}">${esc(it.t)}</a>`;
    return (i?'<span class="sep">/</span>':'')+node;
  }).join(' ');
}
function showHome(fromRoute){
  if(!fromRoute)pushURL(dbBase());
  setAccent('cyan');
  setCrumb([{t:'HOME',cur:true}]);
  switchView('view-home');window.scrollTo({top:0});
}
function tagLabel(t){return {new2026:'2026 신작',ex:'외전',dispute:'논쟁',anime:'애니'}[t]||t;}

/* ===== URL 라우팅 ===== */
function dbBase(){const m=location.pathname.match(/^(.*\/DB)(\/|$)/);return m?m[1]+'/':'/DB/';}
function workSlug(w,eIdx,wi){return w.slug||`w${eIdx}-${wi}`;}
function pushURL(path){try{history.pushState({},'',path);}catch(e){}}
function findWorkBySlug(key,slug){
  const s=getSeries(key);if(!s)return null;
  for(let e=0;e<s.eras.length;e++)for(let i=0;i<s.eras[e].works.length;i++)
    if(workSlug(s.eras[e].works[i],e,i)===slug)return{eIdx:e,wi:i};
  return null;
}
function routeTo(){
  const rest=location.pathname.replace(/^.*\/DB\/?/,'').replace(/\/$/,'');
  const parts=rest.split('/').filter(Boolean);
  const skey=parts[0],wslug=parts[1];
  if(skey&&getSeries(skey)){
    if(wslug){const f=findWorkBySlug(skey,wslug);if(f){showSeries(skey,true);openWork(skey,f.eIdx,f.wi,true);return;}}
    showSeries(skey,true);return;
  }
  showHome(true);
}
window.addEventListener('popstate',routeTo);

renderHome();
routeTo();
</script>
</body>
