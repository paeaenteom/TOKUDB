<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 검색 — 特撮DEX</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f; --bg2:#0a0e1a; --panel:#0e1424; --panel2:#121a2e;
  --line:#1c2540; --line2:#2a3557; --ink:#eef2ff; --dim:#9aa6c8; --faint:#5b6788;
  --cyan:#87CEFF; --pink:#FFB3C8; --acc:#87CEFF;
  --disp:'Teko',sans-serif; --jp:'Noto Sans JP','Noto Sans KR',sans-serif;
  --mono:'Share Tech Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--jp);min-height:100vh;
  background-image:radial-gradient(circle at 20% 0%,rgba(135,206,255,.06),transparent 45%),radial-gradient(circle at 90% 100%,rgba(255,179,200,.05),transparent 45%)}
a{color:inherit;text-decoration:none}
img{display:block}

/* nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(6,8,15,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line2)}
.nav-in{max-width:1180px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
.brand{display:flex;flex-direction:column;line-height:1;cursor:pointer}
.brand .mk{font-family:var(--disp);font-size:26px;font-weight:700;letter-spacing:.5px}
.brand .jp{font-family:var(--jp);font-size:10px;color:var(--dim);letter-spacing:.28em;margin-top:2px}
.home-btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 15px 0 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;cursor:pointer;transition:.18s;text-decoration:none}
.home-btn:hover{border-color:color-mix(in srgb,var(--cyan) 50%,transparent);color:var(--ink)}
.home-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-rec{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:7px}
.nav-rec .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

.wrap{max-width:1180px;margin:0 auto;padding:34px 22px 80px}
.eye{font-family:var(--mono);font-size:12px;letter-spacing:.4em;color:var(--faint);text-align:center}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(38px,6.5vw,64px);line-height:1;text-align:center;margin-top:8px;
  background:linear-gradient(115deg,#fff,#d4dafc 42%,#8b93b5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
h1 .jp{display:block;font-family:var(--jp);font-weight:700;font-size:.24em;letter-spacing:.3em;-webkit-text-fill-color:var(--dim);color:var(--dim);margin-bottom:.6em}
.lead{text-align:center;color:var(--dim);font-size:13.5px;line-height:1.7;max-width:640px;margin:12px auto 0}
.lead b{color:var(--cyan);font-weight:500}

/* search box */
.searchbox{max-width:680px;margin:26px auto 0;position:relative}
.searchbox .field{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:0 16px;height:58px;transition:.2s}
.searchbox .field:focus-within{border-color:color-mix(in srgb,var(--cyan) 55%,transparent);box-shadow:0 0 0 4px rgba(135,206,255,.08)}
.searchbox svg.mag{width:22px;height:22px;fill:none;stroke:var(--faint);stroke-width:2;stroke-linecap:round;flex-shrink:0}
.searchbox input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--jp);font-size:16px}
.searchbox input::placeholder{color:var(--faint)}
.searchbox .clr{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:none;color:var(--faint);cursor:pointer;font-size:13px;line-height:1;display:none}
.searchbox .clr.show{display:block}
.searchbox .clr:hover{color:var(--ink);border-color:var(--cyan)}

/* filter chips */
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:15px}
.fchip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--line2);border-radius:999px;background:var(--panel);color:var(--dim);font-size:12px;cursor:pointer;transition:.16s;font-family:var(--jp)}
.fchip:hover{color:var(--ink);transform:translateY(-1px)}
.fchip.on{border-color:var(--cyan);color:var(--cyan);background:color-mix(in srgb,var(--cyan) 10%,transparent)}
.fchip .n{font-family:var(--mono);font-size:10px;opacity:.75}

/* quick keywords */
.quick{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:11px}
.qk{padding:5px 11px;border:1px dashed var(--line2);border-radius:999px;background:none;color:var(--faint);font-size:11.5px;cursor:pointer;transition:.15s;font-family:var(--jp)}
.qk:hover{color:var(--cyan);border-color:var(--cyan)}

/* status / results */
.status{max-width:1100px;margin:30px auto 0;font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--faint);display:flex;align-items:center;gap:12px}
.status .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.status b{color:var(--cyan);font-weight:400}
.grid{max-width:1100px;margin:16px auto 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px}
.card{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden;cursor:pointer;transition:.18s;position:relative;--c:var(--cyan)}
.card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--c) 55%,var(--line2));box-shadow:0 10px 26px -14px color-mix(in srgb,var(--c) 40%,transparent)}
.card .th{aspect-ratio:3/4;background:radial-gradient(circle at 50% 20%,color-mix(in srgb,var(--c) 14%,transparent),var(--bg2) 70%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card .th img{width:100%;height:100%;object-fit:contain}
.card.sq .th{aspect-ratio:1/1}
.card .th .ph{font-family:var(--disp);font-size:46px;color:color-mix(in srgb,var(--c) 70%,#fff)}
.card .th .kd{position:absolute;top:7px;right:7px;font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(4,6,12,.78);border:1px solid var(--line2);color:var(--dim);backdrop-filter:blur(4px)}
.card .th .rail{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--c),transparent 85%)}
.card .bd{padding:9px 11px 11px}
.card .nm{font-weight:700;font-size:13.5px;line-height:1.25}
.card .sub{font-size:10.5px;color:var(--faint);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px 8px}
.card .sub .w{color:var(--dim)}

/* empty */
.empty{max-width:640px;margin:40px auto 0;text-align:center;color:var(--faint);font-size:13.5px;line-height:1.8}
.empty .big{font-size:34px;margin-bottom:6px}
.webrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.webrow .wk{padding:7px 14px;border:1px solid var(--line2);border-radius:999px;background:var(--panel);color:var(--dim);font-family:var(--mono);font-size:11.5px;cursor:pointer;transition:.15s}
.webrow .wk:hover{color:var(--cyan);border-color:var(--cyan)}

/* gate (file:// 등 자동 로드 실패 시) */
.gate{max-width:560px;margin:46px auto 0;border:1px dashed var(--line2);border-radius:14px;background:var(--panel);padding:26px;text-align:center;display:none}
.gate.show{display:block}
.gate h3{font-size:15px;margin-bottom:8px}
.gate p{font-size:12.5px;color:var(--dim);line-height:1.7}
.gate label{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:10px 18px;border-radius:9px;background:linear-gradient(120deg,var(--cyan),var(--pink));color:#06080f;font-weight:700;font-size:13px;cursor:pointer}

/* lightbox */
.lb{position:fixed;inset:0;z-index:100;background:rgba(3,4,9,.9);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:24px}
.lb.open{display:flex}
.lb .box{max-width:min(920px,94vw);width:100%;max-height:92vh;background:var(--panel);border:1px solid var(--line2);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;--c:var(--cyan)}
.lb .img{position:relative;background:radial-gradient(circle at 50% 30%,color-mix(in srgb,var(--c) 15%,transparent),var(--bg2) 75%);display:flex;align-items:center;justify-content:center;min-height:220px;max-height:62vh}
.lb .img img{max-width:100%;max-height:62vh;object-fit:contain}
.lb .img .rail{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--c),transparent 85%)}
.lb .x{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);background:rgba(4,6,12,.8);color:var(--dim);font-size:16px;cursor:pointer}
.lb .x:hover{color:var(--ink);border-color:var(--cyan)}
.lb .info{padding:16px 20px 18px}
.lb .kick{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;color:color-mix(in srgb,var(--c) 80%,#fff)}
.lb .nm{font-size:21px;font-weight:700;margin-top:3px}
.lb .jp2{font-size:12px;color:var(--dim);margin-top:2px}
.lb .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.lb .meta span{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--dim)}
.lb .acts{display:flex;gap:9px;margin-top:15px}
.lb .acts a{flex:1;text-align:center;padding:11px 0;border-radius:9px;font-size:13px;font-weight:700;border:1px solid var(--line2);color:var(--dim);transition:.16s}
.lb .acts a:hover{color:var(--ink);border-color:var(--cyan)}
.lb .acts a.pri{background:linear-gradient(120deg,var(--cyan),var(--pink));color:#06080f;border:none}

.foot{text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px;letter-spacing:.2em;margin-top:56px;padding-top:24px;border-top:1px solid var(--line)}
@media (max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-in">
    <a class="brand" href="../">
      <span class="mk">特撮DEX</span><span class="jp">現現アーカイブ</span>
    </a>
    <a class="home-btn" href="/">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>HOME
    </a>
    <a class="home-btn" href="../">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>DEX
    </a>
    <div class="nav-rec"><span class="dot"></span>IMAGE SEARCH</div>
  </div>
</nav>

<div class="wrap">
  <div class="eye">TOKUSATSU IMAGE FINDER</div>
  <h1><span class="jp">画像検索</span>이미지 검색</h1>
  <p class="lead">DEX에 등록된 <b>사이트 안의 사진</b>을 한글로 찾습니다. 파일명이 영어여도 상관없어요 —
    <b>고레인저 레드</b>, <b>아카 전신</b>, <b>변신 전</b>, <b>바리도린</b>처럼 이름·색·상태로 검색하세요.</p>

  <div class="searchbox">
    <div class="field">
      <svg class="mag" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="예: 고레인저 레드 전신 / 아카 변신 전 / 황금가면 / 바리블룬" autofocus>
      <button class="clr" id="clr" title="지우기">×</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="quick" id="quick"></div>
  </div>

  <div class="gate" id="gate">
    <h3>데이터 자동 로드 실패</h3>
    <p>배포된 사이트에서는 자동으로 불러옵니다.<br>로컬(file://)에서 테스트 중이라면 <b>DB/index.html</b>을 직접 선택해줘.</p>
    <label>📂 index.html 선택<input type="file" id="gateFile" accept=".html" hidden></label>
  </div>

  <div class="status" id="status" style="display:none"><span id="stTx"></span><span class="ln"></span></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"></div>

  <div class="foot">特撮DEX · IMAGE SEARCH MODULE</div>
</div>

<div class="lb" id="lb" onclick="if(event.target===this)closeLB()">
  <div class="box" id="lbBox"></div>
</div>

<script>
'use strict';
/* ================================================================
   特撮DEX 이미지 검색 — 사이트 내부 사진을 한글로 검색
   데이터 출처: ../index.html 의 const DATA (별도 저장 불필요 —
   편집기로 index.html 을 저장/배포하면 이 검색도 자동 최신화됨)
   ================================================================ */
const $=s=>document.querySelector(s);
let INDEX=[];            // 검색 인덱스 (이미지 1장 = 1항목)
let activeCat='all';

/* ── 유틸 ── */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function norm(s){return String(s==null?'':s).toLowerCase().replace(/[\s·・/\\_\-–—.,+()\[\]{}'"!?~]+/g,'');}
function iu(p){ /* DB/ 기준 상대경로 → 이 페이지(DB/search/) 기준 */
  const s=String(p==null?'':p);
  if(!s)return s;
  if(/^https?:\/\//i.test(s)||s.startsWith('data:')||s.startsWith('//'))return s;
  const enc=s.split('/').map(seg=>seg?encodeURIComponent(seg):seg).join('/');
  return s.startsWith('/')?enc:'../'+enc;
}
/* 부분 문자열은 아니지만 글자 순서대로 포함되면 true (예: "고레드" ⊂ "고레인저…레드") */
function subseq(needle,hay){
  if(needle.length<2)return false;
  let i=0;
  for(let j=0;j<hay.length&&i<needle.length;j++)if(hay[j]===needle[i])i++;
  return i===needle.length;
}
/* hex 색 → 한글 색이름 (검색 키워드용) */
function colorName(hex){
  if(!hex||!/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(hex))return '';
  let h=hex.slice(1); if(h.length===3)h=h.split('').map(c=>c+c).join('');
  const r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2,d=mx-mn;
  const s=d===0?0:d/(1-Math.abs(2*l-1));
  let hue=0;
  if(d!==0){
    if(mx===r)hue=60*(((g-b)/d)%6);
    else if(mx===g)hue=60*((b-r)/d+2);
    else hue=60*((r-g)/d+4);
    if(hue<0)hue+=360;
  }
  if(l<=.13)return '블랙 검정 black';
  if(l>=.92&&s<=.25)return '화이트 흰색 white';
  if(s<=.12)return l>=.6?'실버 그레이 회색 silver gray':'그레이 회색 gray';
  if(hue<15||hue>=345)return '레드 빨강 red';
  if(hue<40)return '오렌지 주황 orange';
  if(hue<68)return '옐로 노랑 골드 yellow gold';
  if(hue<165)return '그린 초록 녹색 green';
  if(hue<200)return '시안 하늘 cyan sky';
  if(hue<250)return '블루 파랑 청색 blue';
  if(hue<290)return '퍼플 보라 바이올렛 purple violet';
  if(hue<345)return '핑크 분홍 마젠타 pink magenta';
  return '';
}

/* ── DATA → 검색 인덱스 ── */
const CAT_ORDER=['영웅','폼','괴수','무장','장비','조직','배너','기타'];
function pushEntry(list,e){
  if(!e.img)return;
  /* 확장: tags / alias 필드가 있으면 그대로 검색 대상 (편집기에서 나중에 태그 입력 지원 예정) */
  const extra=[].concat(e.src&&e.src.tags||[],e.src&&e.src.alias||[],e.src&&e.src.aliases||[]).filter(Boolean);
  const hay1=[e.name,e.jp,e.sub,e.kind,e.cat,e.work,e.workJp,e.series,e.seriesEn,e.colorKw,...(e.kw||[]),...extra].map(norm).join('¦');
  const hay2=[e.item,e.weapon,e.mecha,e.desc].map(norm).join('¦');
  list.push({...e,hay1,hay2,nName:norm(e.name),nJp:norm(e.jp)});
}
function buildIndex(DATA){
  const out=[];
  for(const g of Object.values(DATA)){
    if(!g||!g.series)continue;
    for(const [sKey,s] of Object.entries(g.series)){
      if(!s||!Array.isArray(s.eras))continue;
      s.eras.forEach((era,eIdx)=>{ (era.works||[]).forEach((w,wi)=>{
        const slug=w.slug||('w'+eIdx+'-'+wi);
        const base={work:w.ko,workJp:w.jp,series:s.ko,seriesEn:s.en,href:'../'+sKey+'/'+slug+'/'};
        if(w.img)pushEntry(out,{...base,src:w,img:w.img,name:w.ko,jp:w.jp,cat:'배너',kind:'작품 배너',color:'',kw:['배너','메인','포스터']});
        (w.members||[]).forEach(h=>{
          if(!h||h._divider)return;
          const ckw=colorName(h.color);
          const common={...base,src:h,name:h.name,jp:h.jp,sub:h.sub,color:h.color,colorKw:ckw,item:h.item,weapon:h.weapon,mecha:h.mecha,desc:h.desc,cat:'영웅'};
          if(h.img)pushEntry(out,{...common,img:h.img,kind:h.person?'인물':'슈트 전신',kw:h.person?['인물','사람']:['전신','슈트','풀바디','히어로','변신 후']});
          if(h.imgAlt)pushEntry(out,{...common,img:h.imgAlt,kind:h.imgAltLabel||'변신 전 (본명)',kw:['변신전','변신 전','본명','배우','평상시','민낯']});
          (h.skills||[]).forEach(sk=>{ if(sk&&sk.media&&sk.media.type==='image'&&sk.media.src)
            pushEntry(out,{...common,src:sk,img:sk.media.src,name:sk.name||h.name,jp:sk.jp,cat:'영웅',kind:'스킬 · '+(h.name||''),kw:['스킬','필살기','기술']}); });
        });
        (w.forms||[]).forEach(f=>{
          if(!f||f._divider)return;
          const ckw=colorName(f.color);
          const common={...base,src:f,name:f.name,jp:f.jp,sub:f.sub,color:f.color,colorKw:ckw,item:f.item,weapon:f.weapon,mecha:f.mecha,desc:f.desc,cat:'폼'};
          if(f.img)pushEntry(out,{...common,img:f.img,kind:f.sub||'폼',kw:['전신','폼','슈트','form']});
          (f.skills||[]).forEach(sk=>{ if(sk&&sk.media&&sk.media.type==='image'&&sk.media.src)
            pushEntry(out,{...common,src:sk,img:sk.media.src,name:sk.name||f.name,jp:sk.jp,kind:'스킬 · '+(f.name||''),kw:['스킬','필살기','기술']}); });
        });
        const flat=[['kaiju','괴수',['괴인','몬스터','적']],['arsenal','무장',['무기','웨폰','장비']],['machines','장비',['메카','머신','탈것','비클']],['orgs','조직',['단체','조직','팀']]];
        for(const [k,cat,kw] of flat)(w[k]||[]).forEach(it=>{
          if(!it||it._divider)return;
          const img=it.img||it.photo||(it.media&&it.media.type==='image'&&it.media.src)||'';
          if(!img)return;
          pushEntry(out,{...base,src:it,img,name:it.name,jp:it.jp,sub:it.sub||it.cat,color:it.color,colorKw:colorName(it.color),desc:it.desc,cat,kind:it.sub||it.cat||cat,kw});
        });
      });});
    }
  }
  return out;
}

/* ── 검색 ── */
function search(q){
  const nq=norm(q);
  const tokens=q.split(/\s+/).map(norm).filter(Boolean);
  let pool=INDEX;
  if(activeCat!=='all')pool=pool.filter(e=>e.cat===activeCat);
  if(!nq)return pool.map(e=>({e,score:0}));
  const res=[];
  for(const e of pool){
    let score=0,ok=true;
    for(const t of tokens){
      if(e.nName===t)score+=100;
      else if(e.nName.startsWith(t)||e.nJp===t)score+=60;
      else if(e.nName.includes(t)||e.nJp.includes(t))score+=42;
      else if(e.hay1.includes(t))score+=22;
      else if(e.hay2.includes(t))score+=9;
      else if(subseq(t,e.hay1))score+=3;
      else {ok=false;break;}
    }
    if(!ok)continue;
    if(tokens.length>1&&(e.nName.includes(nq)||e.hay1.includes(nq)))score+=25; /* 붙여쓴 전체 질의도 가산 */
    for(let i=0;i<tokens.length-1;i++)if(e.hay1.includes(tokens[i]+tokens[i+1]))score+=18; /* "변신 전"처럼 띄어 쓴 연속어 정확 매칭 가산 */
    res.push({e,score});
  }
  res.sort((a,b)=>b.score-a.score||CAT_ORDER.indexOf(a.e.cat)-CAT_ORDER.indexOf(b.e.cat));
  return res;
}

/* ── 렌더 ── */
function catCounts(){
  const c={all:INDEX.length};
  for(const e of INDEX)c[e.cat]=(c[e.cat]||0)+1;
  return c;
}
function renderFilters(){
  const c=catCounts();
  const cats=['all',...CAT_ORDER.filter(k=>c[k])];
  $('#filters').innerHTML=cats.map(k=>
    `<button class="fchip ${activeCat===k?'on':''}" data-c="${k}">${k==='all'?'전체':k}<span class="n">${c[k]||0}</span></button>`).join('');
  $('#filters').querySelectorAll('.fchip').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.c;renderFilters();run();}));
}
function renderQuick(){
  const kws=['전신','변신 전','레드','블루','옐로','핑크','그린','괴수','메카','필살기'];
  $('#quick').innerHTML=kws.map(k=>`<button class="qk">${k}</button>`).join('');
  $('#quick').querySelectorAll('.qk').forEach(b=>b.addEventListener('click',()=>{
    const q=$('#q');q.value=(q.value.trim()+' '+b.textContent).trim();q.focus();run();
  }));
}
function cardHTML(e,i){
  const sq=(e.cat==='괴수'||e.cat==='무장'||e.cat==='장비'||e.cat==='조직');
  return `<div class="card ${sq?'sq':''}" data-i="${i}" style="--c:${e.color||'var(--cyan)'}">
    <div class="th"><span class="rail"></span><span class="kd">${esc(e.kind)}</span>
      <img loading="lazy" src="${iu(e.img)}" alt="${esc(e.name)}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'ph',textContent:'${esc((e.name||'?')[0])}'}))"></div>
    <div class="bd"><div class="nm">${esc(e.name)}</div>
      <div class="sub">${e.jp?`<span>${esc(e.jp)}</span>`:''}<span class="w">${esc(e.work)}</span></div></div>
  </div>`;
}
let lastRes=[];
function run(){
  if(!INDEX.length)return;
  const q=$('#q').value;
  $('#clr').classList.toggle('show',!!q.trim());
  const res=search(q);
  lastRes=res;
  $('#status').style.display='flex';
  $('#stTx').innerHTML=q.trim()?`"<b>${esc(q.trim())}</b>" 결과 <b>${res.length}</b>장`:`전체 <b>${res.length}</b>장`;
  $('#grid').innerHTML=res.map((r,i)=>cardHTML(r.e,i)).join('');
  $('#grid').querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openLB(+c.dataset.i)));
  const emp=$('#empty');
  if(!res.length){
    const eq=encodeURIComponent(q.trim());
    emp.style.display='block';
    emp.innerHTML=`<div class="big">🔭</div>사이트 안에서 "<b style="color:var(--ink)">${esc(q.trim())}</b>" 사진을 못 찾았어.<br>아직 등록 전이거나 다른 이름일 수 있어 — 웹에서 바로 찾아볼래?
      <div class="webrow">
        <button class="wk" onclick="window.open('https://www.google.com/search?tbm=isch&q=${eq}','_blank','noopener')">Google 이미지</button>
        <button class="wk" onclick="window.open('https://search.naver.com/search.naver?where=image&query=${eq}','_blank','noopener')">네이버 이미지</button>
        <button class="wk" onclick="window.open('https://www.bing.com/images/search?q=${eq}','_blank','noopener')">Bing 이미지</button>
        <button class="wk" onclick="window.open('https://yandex.com/images/search?text=${eq}','_blank','noopener')">Yandex</button>
      </div>`;
  }else emp.style.display='none';
}
function openLB(i){
  const r=lastRes[i];if(!r)return;
  const e=r.e;
  $('#lbBox').style.setProperty('--c',e.color||'var(--cyan)');
  $('#lbBox').innerHTML=`
    <div class="img"><span class="rail"></span><img src="${iu(e.img)}" alt="${esc(e.name)}">
      <button class="x" onclick="closeLB()">×</button></div>
    <div class="info">
      <div class="kick">${esc(e.cat)} · ${esc(e.kind)}</div>
      <div class="nm">${esc(e.name)}</div>
      ${e.jp?`<div class="jp2">${esc(e.jp)}</div>`:''}
      <div class="meta"><span>${esc(e.series)}</span><span>${esc(e.work)}</span>${e.sub?`<span>${esc(e.sub)}</span>`:''}</div>
      <div class="acts">
        <a class="pri" href="${esc(e.href)}">DEX에서 열기</a>
        <a href="${iu(e.img)}" target="_blank" rel="noopener">원본 새 탭</a>
      </div>
    </div>`;
  $('#lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(){$('#lb').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

/* ── DATA 로드: ../index.html fetch → const DATA 블록 파싱 ── */
function findDataBlock(t){
  const marker='const DATA = ';
  const mi=t.indexOf(marker);if(mi===-1)return null;
  const os=mi+marker.length;if(t[os]!=='{')return null;
  let d=0,i=os,inS=false,sc='',ef=false;
  for(;i<t.length;i++){const ch=t[i];
    if(inS){if(ef)ef=false;else if(ch==='\\')ef=true;else if(ch===sc)inS=false;continue;}
    if(ch==='"'||ch==="'"||ch==='`'){inS=true;sc=ch;continue;}
    if(ch==='{')d++;else if(ch==='}'){d--;if(d===0){i++;break;}}}
  return t.slice(os,i);
}
function boot(text){
  let data;
  try{data=JSON.parse(findDataBlock(text));}
  catch(err){$('#gate').classList.add('show');return;}
  INDEX=buildIndex(data);
  $('#gate').classList.remove('show');
  renderFilters();renderQuick();run();
}
fetch('../index.html',{cache:'no-store'}).then(r=>{
  if(!r.ok)throw 0;return r.text();
}).then(boot).catch(()=>{$('#gate').classList.add('show');});
$('#gateFile').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  boot(await f.text());
});

/* ── 입력 ── */
let t=null;
$('#q').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(run,180);});
$('#q').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(t);run();}});
$('#clr').addEventListener('click',()=>{$('#q').value='';run();$('#q').focus();});
</script>
